---
id: https://w3id.org/nfdi4cat/catcore/simulation/
name: catcore-simulation-ap
title: CatCore Simulation Application Profile
description: |-
  Application profile for computational simulations within the CatCore metadata model.

  This module defines:
  - Simulation — the DataGeneratingActivity in which a catalyst or catalytic
    process is modelled computationally
  - SimulationMethod — the Plan (protocol) hierarchy realized by Simulation,
    with 4 concrete subclasses: DFT, MolecularDynamics, Microkinetics, MonteCarlo
  - CalculatedProperty — a QualitativeAttribute hierarchy grouping the output
    properties of the simulation, with 12 concrete subclasses
  - 2 mixin classes bundling slot groups shared across CalculatedProperty subclasses:
      MaterialDescriptorMixin (material_composition, crystal_structure)
      DFTSettingsMixin       (energy_cutoff, convergence_criteria, k_point_mesh)

  Alignment to DCAT-AP-PLUS:
    Simulation        → is_a: DataGeneratingActivity  (prov:Activity)
    SimulationMethod  → is_a: Plan                    (prov:Plan / OBI:0000272)
    CalculatedProperty → is_a: QualitativeAttribute   (output property descriptor)

  The specific simulation type is expressed via rdf_type on Simulation using an
  ontology term (e.g. catcore:DFT, NCIT:C18097 for MD), following DCAT-AP-PLUS
  Pattern 3 — exactly as NMRSpectroscopy uses rdf_type: CHMO:0000613.

  The simulation software is linked via carried_out_by as a Software agent.

  CalculatedProperty design decision:
  ─────────────────────────────────────
  In DCAT-AP-PLUS, calculated/measured properties are modelled as
  QualitativeAttribute instances linked from the activity or entity.
  CalculatedProperty and its subclasses follow this pattern: they are
  linked from Simulation via the calculated_property slot.
  Each subclass captures the property-specific output values and the
  computational settings needed to reproduce them.

license: CC-BY-4.0
version: 1.0.0

prefixes:
  catcore: https://w3id.org/nfdi4cat/catcore/
  VOC4CAT: https://w3id.org/nfdi4cat/voc4cat_
  dcatapplus: https://nfdi-de.github.io/dcat-ap-plus/
  linkml: https://w3id.org/linkml/
  prov: http://www.w3.org/ns/prov#
  OBI: http://purl.obolibrary.org/obo/OBI_
  NCIT: http://purl.obolibrary.org/obo/NCIT_
  SIO: http://semanticscience.org/resource/SIO_
  AFR: http://purl.allotrope.org/ontologies/result#AFR_
  APOLLO_SV: http://purl.obolibrary.org/obo/APOLLO_SV_

default_prefix: catcore
default_range: string

imports:
  - linkml:types
  - catcore_common   # shared slots (temperature, pressure, …) + enums

# ==================== MIXINS ====================

classes:

  MaterialDescriptorMixin:
    mixin: true
    description: |-
      Mixin providing material identity slots shared by CalculatedProperty
      subclasses that target a specific material composition and crystal
      structure (DielectricTensors, PhononDispersion, EquationsOfState,
      AqueousStability, GrainBoundaries, ElectronicStructure, Ferroelectrics,
      BandGap).
    slots:
      - material_composition
      - crystal_structure

  DFTSettingsMixin:
    mixin: true
    description: |-
      Mixin providing plane-wave DFT numerical settings shared by CalculatedProperty
      subclasses that are computed with periodic DFT (DielectricTensors,
      EquationsOfState, ElectronicStructure, BandGap).
    slots:
      - energy_cutoff
      - convergence_criteria
      - k_point_mesh

  # ==================== SIMULATION (DataGeneratingActivity) ====================

  Simulation:
    is_a: DataGeneratingActivity
    class_uri: NCIT:C48936   # computer simulation
    description: |-
      A DataGeneratingActivity in which a catalyst, catalytic material, or
      catalytic process is modelled computationally.

      The simulation software is linked via carried_out_by as a Software agent.
      The simulation method (protocol) is linked via realized_plan using a
      SimulationMethod instance. The catalyst model or reaction being simulated
      is linked via evaluated_entity or evaluated_activity.

      The specific simulation type is expressed via rdf_type (e.g. catcore:DFT,
      NCIT:C18097 for molecular dynamics), following DCAT-AP-PLUS Pattern 3.
    slots:
      - software_package
      - calculated_property
    slot_usage:
      rdf_type:
        description: |-
          The type of simulation method as an ontology term (e.g. catcore:DFT,
          NCIT:C18097 for MD, catcore:Microkinetics). This is the primary
          machine-actionable classification of the simulation type.
        recommended: true
      realized_plan:
        description: |-
          The SimulationMethod (protocol) realized in this Simulation.
        range: SimulationMethod
        required: true
        multivalued: true
        inlined_as_list: true
      carried_out_by:
        description: |-
          The simulation software used, provided as a Software agent instance.
        range: AgenticEntity
        recommended: true
        multivalued: true
        inlined_as_list: true
      evaluated_entity:
        description: |-
          The catalyst model, surface slab, or molecule being simulated.
        range: EvaluatedEntity
        recommended: true
        multivalued: true
        inlined_as_list: true

  # ==================== SIMULATION METHODS (Plans) ====================

  SimulationMethod:
    is_a: Plan
    class_uri: OBI:0000272
    abstract: true
    description: |-
      Abstract Plan describing the computational method (protocol) used in a
      Simulation. Concrete subclasses carry method-specific parameter slots.
      Linked from Simulation via realized_plan.

  DFT:
    is_a: SimulationMethod
    class_uri: catcore:DFT
    description: |-
      Density functional theory — a quantum mechanical method for calculating
      the electronic structure of atoms, molecules, and periodic solids.
      The most widely used ab initio method in computational catalysis.
    slots:
      - exchange_correlation_functional
      - energy_cutoff
      - convergence_criteria
      - dft_u_parameters
      - spin_polarization
      - total_energy_per_atom

  MolecularDynamics:
    is_a: SimulationMethod
    class_uri: NCIT:C18097
    description: |-
      Molecular dynamics simulation — a method for computing the time evolution
      of a system of interacting particles by integrating the equations of motion.
      Used to study diffusion, reaction kinetics, and thermal properties.
    slots:
      - force_field
      - simulation_timestep
      - simulation_time
      - ensemble_type
      - number_of_atoms

  Microkinetics:
    is_a: SimulationMethod
    class_uri: catcore:Microkinetics
    description: |-
      Microkinetic modelling — a mean-field kinetic approach that integrates
      elementary reaction steps and their rate constants to predict catalytic
      activity and selectivity under reaction conditions.
    slots:
      - rate_constants
      - solver_type
      - temperature
      - pressure
      - surface_coverage
      - activation_energy

  MonteCarlo:
    is_a: SimulationMethod
    class_uri: catcore:MonteCarlo
    description: |-
      Monte Carlo simulation — a stochastic method that samples configuration
      space using random moves accepted or rejected according to a statistical
      criterion (e.g. Metropolis). Used for adsorption isotherms, phase diagrams,
      and lattice-based kinetics.
    slots:
      - interaction_potential
      - number_of_steps
      - temperature
      - lattice_size_type
      - acceptance_criteria
      - equilibration_steps
      - sampling_interval

  # ==================== CALCULATED PROPERTIES ====================

  CalculatedProperty:
    is_a: QualitativeAttribute
    class_uri: catcore:CalculatedProperty
    abstract: true
    description: |-
      Abstract QualitativeAttribute representing a property computed by a
      Simulation. Concrete subclasses carry the property-specific output
      values and the computational settings used to produce them.
      Linked from Simulation via the calculated_property slot.

  ThermodynamicStability:
    is_a: CalculatedProperty
    class_uri: catcore:ThermodynamicStability
    description: |-
      Thermodynamic stability of a material or phase, characterised by formation
      energy, convex hull distance, and competing phases. Used to screen catalyst
      stability and predict synthesis feasibility.
    slots:
      - formation_energy
      - reference_energies
      - energy_above_hull
      - phase_diagram_type
      - competing_phases

  Piezoelectricity:
    is_a: CalculatedProperty
    class_uri: catcore:Piezoelectricity
    description: |-
      Piezoelectric response of a non-centrosymmetric material, described by the
      piezoelectric tensor. Relevant for piezocatalysis applications.
    slots:
      - piezoelectric_tensor
      - crystal_symmetry
      - strain_applied
      - ionic_electronic_contributions

  ElasticConstants:
    is_a: CalculatedProperty
    class_uri: catcore:ElasticConstants
    description: |-
      Elastic mechanical properties of a material derived from the elastic tensor,
      including bulk modulus, shear modulus, and Young's modulus.
    slots:
      - elastic_tensor
      - bulk_modulus
      - shear_modulus
      - poisson_ratio
      - young_modulus

  Surfaces:
    is_a: CalculatedProperty
    class_uri: catcore:Surfaces
    description: |-
      Surface properties of a catalyst computed from a periodic slab model,
      including surface energy, Miller index, slab thickness, and vacuum spacing.
      Central to heterogeneous catalysis modelling.
    slots:
      - surface_energy
      - miller_indices
      - slab_thickness
      - vacuum_spacing
      - surface_termination_method

  DielectricTensors:
    is_a: CalculatedProperty
    class_uri: catcore:DielectricTensors
    mixins:
      - MaterialDescriptorMixin
      - DFTSettingsMixin
    description: |-
      Dielectric tensor computed from density functional perturbation theory (DFPT).
      Characterises the optical and static dielectric response of a material.
    slots:
      - dielectric_tensor
      - born_effective_charges

  PhononDispersion:
    is_a: CalculatedProperty
    class_uri: catcore:PhononDispersion
    mixins:
      - MaterialDescriptorMixin
    description: |-
      Phonon dispersion relations computed from interatomic force constants,
      providing access to vibrational frequencies, thermodynamic quantities,
      and dynamical stability (imaginary modes).
    slots:
      - force_constant_method
      - kq_point_mesh
      - smearing_parameter
      - imaginary_modes

  EquationsOfState:
    is_a: CalculatedProperty
    class_uri: catcore:EquationsOfState
    mixins:
      - MaterialDescriptorMixin
      - DFTSettingsMixin
    description: |-
      Equation of state relating energy (or enthalpy) to volume, fitted to a
      parametric model (e.g. Birch-Murnaghan). Used to extract equilibrium
      volume, bulk modulus, and its pressure derivative.
    slots:
      - fit_method
      - bulk_modulus
      - pressure_derivative
      - fit_residuals

  AqueousStability:
    is_a: CalculatedProperty
    class_uri: catcore:AqueousStability
    mixins:
      - MaterialDescriptorMixin
    description: |-
      Electrochemical (Pourbaix) stability of a catalyst in aqueous solution as
      a function of pH and electrode potential. Critical for electrocatalyst
      stability screening.
    slots:
      - ph_range
      - potential_range
      - solvation_model
      - ionic_strength
      - temperature

  GrainBoundaries:
    is_a: CalculatedProperty
    class_uri: catcore:GrainBoundaries
    mixins:
      - MaterialDescriptorMixin
    description: |-
      Grain boundary structure and energetics from atomistic simulation.
      Relevant for understanding polycrystalline catalyst behaviour,
      sintering, and charge/defect segregation.
    slots:
      - grain_boundary_plane
      - misorientation_angle
      - grain_boundary_energy
      - simulation_cell_size
      - gb_excess_volume
      - gb_structural_units
      - charge_defect_segregation

  ElectronicStructure:
    is_a: CalculatedProperty
    class_uri: catcore:ElectronicStructure
    mixins:
      - MaterialDescriptorMixin
      - DFTSettingsMixin
    description: |-
      Electronic band structure and density of states, characterising the
      electronic properties of a catalyst relevant to activity descriptors
      (d-band centre, band gap, Fermi energy).
    slots:
      - smearing_method
      - spin_polarized
      - band_path
      - fermi_energy

  Ferroelectrics:
    is_a: CalculatedProperty
    class_uri: catcore:Ferroelectrics
    mixins:
      - MaterialDescriptorMixin
    description: |-
      Ferroelectric properties computed from DFT, including spontaneous
      polarization, switching barrier, and coercive field. Relevant for
      ferroelectric-photocatalyst design.
    slots:
      - polarization_direction
      - spontaneous_polarization
      - reference_structure
      - switching_barrier
      - coercive_field
      - temperature_dependence

  BandGap:
    is_a: CalculatedProperty
    class_uri: catcore:BandGap
    mixins:
      - MaterialDescriptorMixin
      - DFTSettingsMixin
    description: |-
      Electronic band gap and its character (direct/indirect), with optional
      many-body (GW) or excitonic corrections. Critical for photocatalyst
      and semiconductor catalyst screening.
    slots:
      - material_sample
      - structure_model
      - smearing_broadening
      - direct_indirect
      - experimental_reference
      - gw_hybrid_correction
      - excitonic_correction

# ==================== SLOTS ====================
# Shared slots (temperature, pressure, …) are inherited from catcore_common.

slots:

  # ---- Simulation-level slots ----

  software_package:
    description: |-
      Software package or code used for the simulation (e.g. VASP, Quantum ESPRESSO,
      LAMMPS, CP2K, ORCA, Zacros). Include version number where possible.
    range: string
    slot_uri: catcore:software_package
    required: true
    multivalued: true

  calculated_property:
    description: |-
      A property computed by this Simulation, provided as a CalculatedProperty
      instance. Multiple properties may be computed in a single simulation run.
    range: CalculatedProperty
    slot_uri: catcore:calculated_property
    required: true
    multivalued: true
    inlined_as_list: true

  # ---- DFT method slots ----

  exchange_correlation_functional:
    description: |-
      Exchange-correlation functional used (e.g. PBE, PBEsol, RPBE, B3LYP,
      HSE06). The choice of functional directly affects accuracy.
    range: string
    slot_uri: catcore:exchange_correlation_functional
    multivalued: true

  energy_cutoff:
    description: Plane-wave kinetic energy cutoff for the basis set expansion.
    range: float
    slot_uri: catcore:energy_cutoff
    multivalued: true
    unit:
      ucum_code: eV

  convergence_criteria:
    description: |-
      Convergence thresholds applied during self-consistent field (SCF) and/or
      geometry optimisation (e.g. energy < 1e-5 eV, forces < 0.02 eV/Å).
    range: string
    slot_uri: catcore:convergence_criteria
    multivalued: true

  dft_u_parameters:
    description: |-
      Hubbard U correction parameters (DFT+U). Specify element, orbital, and
      U value (e.g. "Fe d: U=4.0 eV, J=0.0 eV").
    range: string
    slot_uri: catcore:dft_u_parameters
    multivalued: true

  spin_polarization:
    description: |-
      Whether spin polarization (collinear magnetism) is included in the DFT
      calculation. Set to true for systems containing magnetic elements.
    range: boolean
    slot_uri: catcore:spin_polarization
    multivalued: true

  total_energy_per_atom:
    description: Total DFT ground-state energy divided by number of atoms in the unit cell.
    range: float
    slot_uri: catcore:total_energy_per_atom
    multivalued: true
    unit:
      ucum_code: eV

  # ---- MD method slots ----

  force_field:
    description: |-
      Force field or interatomic potential used (e.g. ReaxFF, CHARMM, Tersoff,
      EAM). Include parametrisation source or reference.
    range: string
    slot_uri: catcore:force_field
    multivalued: true

  simulation_timestep:
    description: Integration timestep used in molecular dynamics.
    range: float
    slot_uri: APOLLO_SV:00000012
    multivalued: true
    unit:
      ucum_code: fs

  simulation_time:
    description: Total simulated physical time of the MD trajectory.
    range: float
    slot_uri: catcore:simulation_time
    multivalued: true
    unit:
      ucum_code: ps

  ensemble_type:
    description: |-
      Statistical ensemble used in MD (e.g. NVE, NVT, NPT). Determines which
      thermodynamic quantities are conserved.
    range: string
    slot_uri: catcore:ensemble_type
    multivalued: true

  number_of_atoms:
    description: Number of atoms in the simulation cell or supercell.
    range: integer
    slot_uri: catcore:number_of_atoms
    multivalued: true

  # ---- Microkinetics method slots ----

  rate_constants:
    description: |-
      Rate constants or Arrhenius parameters (pre-exponential factor and
      activation energy) for each elementary step in the reaction network.
    range: string
    slot_uri: NCIT:C94967
    multivalued: true

  solver_type:
    description: |-
      Numerical solver used for the microkinetic rate equations (e.g. LSODA,
      stiff ODE solver, steady-state Newton method).
    range: string
    slot_uri: catcore:solver_type
    multivalued: true

  pressure:
    description: Total pressure used in microkinetic or Monte Carlo simulation.
    range: float
    slot_uri: catcore:pressure
    multivalued: true
    unit:
      ucum_code: bar

  surface_coverage:
    description: Surface coverage of adsorbed species (fraction of surface sites occupied).
    range: float
    slot_uri: catcore:surface_coverage
    multivalued: true

  activation_energy:
    description: Activation energy for each elementary step in the reaction mechanism.
    range: float
    slot_uri: catcore:activation_energy
    multivalued: true
    unit:
      ucum_code: eV

  # ---- Monte Carlo method slots ----

  interaction_potential:
    description: Interaction potential or Hamiltonian used to compute energies in MC moves.
    range: string
    slot_uri: catcore:interaction_potential
    multivalued: true

  number_of_steps:
    description: Total number of Monte Carlo moves or trial configurations generated.
    range: integer
    slot_uri: catcore:number_of_steps
    multivalued: true

  lattice_size_type:
    description: |-
      Lattice geometry and dimensions used in lattice-based MC (e.g.
      "100×100 square lattice", "hexagonal 50×50").
    range: string
    slot_uri: catcore:lattice_size_type
    multivalued: true

  acceptance_criteria:
    description: |-
      Criterion for accepting or rejecting MC moves (e.g. Metropolis,
      Kawasaki, heat-bath algorithm).
    range: string
    slot_uri: catcore:acceptance_criteria
    multivalued: true

  equilibration_steps:
    description: Number of MC steps used for equilibration before data collection begins.
    range: integer
    slot_uri: catcore:equilibration_steps
    multivalued: true

  sampling_interval:
    description: Interval between successive MC snapshots used for property averaging.
    range: integer
    slot_uri: catcore:sampling_interval
    multivalued: true

  # ---- MaterialDescriptorMixin slots ----

  material_composition:
    description: |-
      Chemical composition of the simulated material (e.g. "Fe2O3", "Pt/CeO2").
      Use empirical formula or SMILES for molecular systems.
    range: string
    slot_uri: catcore:material_composition
    multivalued: true

  crystal_structure:
    description: |-
      Crystal structure of the simulated material, including space group and
      lattice parameters (e.g. "Fm-3m, a=3.92 Å for Pt").
    range: string
    slot_uri: SIO:001100
    multivalued: true

  # ---- DFTSettingsMixin slots (energy_cutoff, convergence_criteria, k_point_mesh declared above / here) ----

  k_point_mesh:
    description: |-
      Monkhorst-Pack k-point mesh used for Brillouin zone sampling
      (e.g. "4×4×1" for a surface slab, "8×8×8" for a bulk cell).
    range: string
    slot_uri: catcore:k_point_mesh
    multivalued: true

  # ---- ThermodynamicStability slots ----

  formation_energy:
    description: Formation energy per atom relative to elemental reference states.
    range: float
    slot_uri: catcore:formation_energy
    multivalued: true
    unit:
      ucum_code: eV

  reference_energies:
    description: |-
      Elemental reference energies used to compute formation energies
      (e.g. DFT total energies of elemental ground-state structures).
    range: string
    slot_uri: catcore:reference_energies
    multivalued: true

  energy_above_hull:
    description: |-
      Distance above the convex hull of stable phases (thermodynamic stability
      metric). Zero for phases on the hull; positive values indicate metastability.
    range: float
    slot_uri: catcore:energy_above_hull
    multivalued: true
    unit:
      ucum_code: eV

  phase_diagram_type:
    description: Type of phase diagram constructed (e.g. binary, ternary, quaternary).
    range: string
    slot_uri: catcore:phase_diagram_type
    multivalued: true

  competing_phases:
    description: |-
      List of stable competing phases used in convex hull construction
      (e.g. "Fe2O3, Fe3O4, FeO, Fe").
    range: string
    slot_uri: catcore:competing_phases
    multivalued: true

  # ---- Piezoelectricity slots ----

  piezoelectric_tensor:
    description: |-
      Components of the piezoelectric tensor e_ij (C/m²) or d_ij (pC/N),
      describing the coupling between stress and electric polarization.
    range: string
    slot_uri: catcore:piezoelectric_tensor
    multivalued: true

  crystal_symmetry:
    description: Point group or space group symmetry of the crystal structure.
    range: string
    slot_uri: catcore:crystal_symmetry
    multivalued: true

  strain_applied:
    description: Magnitude of applied strain in the piezoelectric calculation.
    range: float
    slot_uri: catcore:strain_applied
    multivalued: true

  ionic_electronic_contributions:
    description: |-
      Decomposition of the piezoelectric or dielectric response into ionic
      (nuclear) and electronic contributions.
    range: string
    slot_uri: catcore:ionic_electronic_contributions
    multivalued: true

  # ---- ElasticConstants slots ----

  elastic_tensor:
    description: |-
      Full Voigt-notation elastic tensor C_ij (GPa) describing the linear
      elastic response of the material.
    range: string
    slot_uri: catcore:elastic_tensor
    multivalued: true

  bulk_modulus:
    description: Bulk modulus (resistance to uniform compression).
    range: float
    slot_uri: catcore:bulk_modulus
    multivalued: true
    unit:
      ucum_code: GPa

  shear_modulus:
    description: Shear modulus (resistance to shear deformation).
    range: float
    slot_uri: catcore:shear_modulus
    multivalued: true
    unit:
      ucum_code: GPa

  poisson_ratio:
    description: Poisson's ratio (ratio of transverse to axial strain under uniaxial load).
    range: float
    slot_uri: catcore:poisson_ratio
    multivalued: true

  young_modulus:
    description: Young's modulus (stiffness under uniaxial tension or compression).
    range: float
    slot_uri: catcore:young_modulus
    multivalued: true
    unit:
      ucum_code: GPa

  # ---- Surfaces slots ----

  surface_energy:
    description: |-
      Cleavage energy per unit area required to create the surface from the bulk.
      A lower value indicates a more stable surface facet.
    range: float
    slot_uri: catcore:surface_energy
    multivalued: true
    unit:
      ucum_code: J/m2

  miller_indices:
    description: |-
      Miller indices of the modelled surface facet (e.g. "(111)", "(110)", "(100)").
    range: string
    slot_uri: catcore:miller_indices
    multivalued: true

  slab_thickness:
    description: Thickness of the periodic slab model used to represent the surface.
    range: float
    slot_uri: catcore:slab_thickness
    multivalued: true
    unit:
      ucum_code: Ao   # angstrom

  vacuum_spacing:
    description: |-
      Vacuum layer thickness added above the slab to prevent spurious
      periodic interactions between slab images.
    range: float
    slot_uri: catcore:vacuum_spacing
    multivalued: true
    unit:
      ucum_code: Ao   # angstrom

  surface_termination_method:
    description: |-
      Method used to terminate the slab and handle dangling bonds
      (e.g. H-passivation, OH-termination, dipole correction).
    range: string
    slot_uri: catcore:surface_termination_method
    multivalued: true

  # ---- DielectricTensors slots ----

  dielectric_tensor:
    description: |-
      Components of the static and/or high-frequency dielectric tensor ε_ij,
      computed from DFPT.
    range: string
    slot_uri: catcore:dielectric_tensor
    multivalued: true

  born_effective_charges:
    description: |-
      Born effective charge tensors Z*_ij for each atom, describing how
      the polarization changes with atomic displacements.
    range: string
    slot_uri: catcore:born_effective_charges
    multivalued: true

  # ---- PhononDispersion slots ----

  force_constant_method:
    description: |-
      Method used to compute the interatomic force constants (e.g. finite
      differences / supercell method, DFPT/linear response).
    range: string
    slot_uri: catcore:force_constant_method
    multivalued: true

  kq_point_mesh:
    description: |-
      k/q-point mesh for phonon Brillouin zone sampling (e.g. "8×8×8").
      Distinct from the electronic k-point mesh.
    range: string
    slot_uri: catcore:kq_point_mesh
    multivalued: true

  smearing_parameter:
    description: Smearing or broadening parameter applied to the phonon density of states.
    range: float
    slot_uri: catcore:smearing_parameter
    multivalued: true
    unit:
      ucum_code: eV

  imaginary_modes:
    description: |-
      Whether imaginary (soft) phonon modes are present in the dispersion.
      Imaginary modes indicate dynamical instability of the structure.
    range: boolean
    slot_uri: catcore:imaginary_modes
    multivalued: true

  # ---- EquationsOfState slots ----

  fit_method:
    description: |-
      Parametric model used to fit the energy-volume curve
      (e.g. Birch-Murnaghan 3rd order, Vinet, Murnaghan).
    range: string
    slot_uri: catcore:fit_method
    multivalued: true

  pressure_derivative:
    description: Pressure derivative of the bulk modulus B' (dimensionless).
    range: float
    slot_uri: catcore:pressure_derivative
    multivalued: true

  fit_residuals:
    description: Root-mean-square residuals of the energy-volume fit.
    range: float
    slot_uri: catcore:fit_residuals
    multivalued: true

  # ---- AqueousStability slots ----

  ph_range:
    description: pH range covered in the Pourbaix stability diagram (e.g. "0–14").
    range: string
    slot_uri: catcore:ph_range
    multivalued: true

  potential_range:
    description: |-
      Electrode potential range covered in the Pourbaix diagram
      (e.g. "-2 to +2 V vs SHE").
    range: string
    slot_uri: catcore:potential_range
    multivalued: true

  solvation_model:
    description: |-
      Implicit solvation model used to account for aqueous environment
      (e.g. VASPsol, SCCS/Environ, COSMO).
    range: string
    slot_uri: catcore:solvation_model
    multivalued: true

  ionic_strength:
    description: Ionic strength of the electrolyte solution modelled.
    range: float
    slot_uri: catcore:ionic_strength
    multivalued: true
    unit:
      ucum_code: mol/L

  # ---- GrainBoundaries slots ----

  grain_boundary_plane:
    description: |-
      Crystallographic plane of the grain boundary, expressed using
      Miller indices (e.g. "Σ5 (310)[001]").
    range: string
    slot_uri: catcore:grain_boundary_plane
    multivalued: true

  misorientation_angle:
    description: Misorientation angle between adjacent grains at the boundary.
    range: float
    slot_uri: catcore:misorientation_angle
    multivalued: true
    unit:
      ucum_code: deg

  grain_boundary_energy:
    description: Excess energy per unit area of the grain boundary.
    range: float
    slot_uri: catcore:grain_boundary_energy
    multivalued: true
    unit:
      ucum_code: J/m2

  simulation_cell_size:
    description: |-
      Dimensions of the simulation cell used to model the grain boundary
      (e.g. "10×10×30 nm").
    range: string
    slot_uri: catcore:simulation_cell_size
    multivalued: true

  gb_excess_volume:
    description: Excess volume per unit area associated with the grain boundary.
    range: float
    slot_uri: catcore:gb_excess_volume
    multivalued: true

  gb_structural_units:
    description: |-
      Description of the structural units (repeating atomic motifs) that
      constitute the grain boundary structure.
    range: string
    slot_uri: catcore:gb_structural_units
    multivalued: true

  charge_defect_segregation:
    description: |-
      Data describing charge carrier or point defect segregation behaviour
      at the grain boundary (e.g. segregation energy per defect type).
    range: string
    slot_uri: catcore:charge_defect_segregation
    multivalued: true

  # ---- ElectronicStructure slots ----

  smearing_method:
    description: |-
      Electronic smearing scheme and width used in the SCF calculation
      (e.g. Methfessel-Paxton order 1 with σ=0.2 eV, Gaussian with σ=0.05 eV).
    range: string
    slot_uri: catcore:smearing_method
    multivalued: true

  spin_polarized:
    description: |-
      Whether the electronic structure calculation is spin-polarized
      (accounts for spin-up and spin-down electrons separately).
    range: boolean
    slot_uri: catcore:spin_polarized
    multivalued: true

  band_path:
    description: |-
      High-symmetry k-path through the Brillouin zone used to plot the
      band structure (e.g. "Γ-X-M-Γ-R" for cubic, following SeeK-path convention).
    range: string
    slot_uri: catcore:band_path
    multivalued: true

  fermi_energy:
    description: Fermi energy (chemical potential of electrons) in the calculated system.
    range: float
    slot_uri: catcore:fermi_energy
    multivalued: true
    unit:
      ucum_code: eV

  # ---- Ferroelectrics slots ----

  polarization_direction:
    description: |-
      Crystallographic direction of the spontaneous electric polarization
      (e.g. "[001]" for tetragonal BaTiO₃).
    range: string
    slot_uri: catcore:polarization_direction
    multivalued: true

  spontaneous_polarization:
    description: Magnitude of the spontaneous electric polarization.
    range: float
    slot_uri: catcore:spontaneous_polarization
    multivalued: true
    unit:
      ucum_code: uC/cm2

  reference_structure:
    description: |-
      Reference (paraelectric/centrosymmetric) structure used as the zero-
      polarization endpoint in the Berry-phase polarization calculation.
    range: string
    slot_uri: catcore:reference_structure
    multivalued: true

  switching_barrier:
    description: Energy barrier for polarization switching between equivalent states.
    range: float
    slot_uri: catcore:switching_barrier
    multivalued: true
    unit:
      ucum_code: eV

  coercive_field:
    description: Electric field required to reverse the polarization direction.
    range: float
    slot_uri: catcore:coercive_field
    multivalued: true
    unit:
      ucum_code: kV/cm

  temperature_dependence:
    description: Description of how the ferroelectric properties vary with temperature.
    range: string
    slot_uri: catcore:temperature_dependence
    multivalued: true

  # ---- BandGap slots ----

  material_sample:
    description: |-
      Reference to the material or MaterialSample being characterised by this
      calculated band gap.
    range: string
    slot_uri: VOC4CAT:0005056
    multivalued: true

  structure_model:
    description: |-
      Model structure used in the band gap calculation (e.g. bulk unit cell,
      surface slab, defect supercell).
    range: string
    slot_uri: catcore:structure_model
    multivalued: true

  smearing_broadening:
    description: Gaussian or Lorentzian broadening applied to the simulated spectrum.
    range: float
    slot_uri: catcore:smearing_broadening
    multivalued: true
    unit:
      ucum_code: eV

  direct_indirect:
    description: |-
      Band gap character: "direct" (VBM and CBM at same k-point) or
      "indirect" (VBM and CBM at different k-points).
    range: string
    slot_uri: catcore:direct_indirect
    multivalued: true

  experimental_reference:
    description: Experimental band gap value used for benchmarking the calculation.
    range: float
    slot_uri: catcore:experimental_reference
    multivalued: true
    unit:
      ucum_code: eV

  gw_hybrid_correction:
    description: |-
      Whether a many-body GW correction or hybrid functional (e.g. HSE06)
      was applied to correct the DFT band gap underestimation.
    range: boolean
    slot_uri: catcore:gw_hybrid_correction
    multivalued: true

  excitonic_correction:
    description: |-
      Excitonic correction (from Bethe-Salpeter equation) applied to the
      optical band gap.
    range: float
    slot_uri: catcore:excitonic_correction
    multivalued: true
    unit:
      ucum_code: eV
