---
id: https://w3id.org/nfdi4cat/coremeta4cat/synthesis/
name: coremeta4cat-synthesis-ap
title: CoreMeta4cat Synthesis Application Profile
description: |-
  Application profile for catalyst synthesis within the CoreMeta4cat metadata model.

  This module defines:
  - Synthesis — the DataGeneratingActivity in which a catalyst is prepared
  - Precursor — the input material (a MaterialSample) consumed during synthesis
  - CatalystSample — the output material (a MaterialSample) produced by synthesis
  - PreparationMethod — the Plan (protocol) realized by a Synthesis activity
  - Concrete PreparationMethod subclasses (Impregnation, CoPrecipitation, …)
  - Four mixin classes that bundle slot groups shared across preparation methods:
      DryingMixin, CalcinationMixin, PrecipitationMixin, ThermalSynthesisMixin

  Alignment to DCAT-AP-PLUS:
    Synthesis          --> is_a: DataGeneratingActivity  (prov:Activity)
    Precursor          --> is_a: MaterialSample           (OBI:0000747, EvaluatedEntity)
    CatalystSample     --> is_a: MaterialSample           (OBI:0000747, EvaluatedEntity)
    PreparationMethod  --> is_a: Plan                     (prov:Plan)
    Concrete methods   --> is_a: PreparationMethod        (Plan subclasses)

license: CC-BY-4.0
version: 1.0.0

prefixes:
  coremeta4cat: https://w3id.org/nfdi4cat/coremeta4cat/
  VOC4CAT: https://w3id.org/nfdi4cat/voc4cat_
  dcatapplus: https://w3id.org/nfdi-de/dcat-ap-plus/
  linkml: https://w3id.org/linkml/
  prov: http://www.w3.org/ns/prov#
  OBI: http://purl.obolibrary.org/obo/OBI_
  CHEBI: http://purl.obolibrary.org/obo/CHEBI_
  BFO: http://purl.obolibrary.org/obo/BFO_
  SIO: http://semanticscience.org/resource/SIO_
  AFR: http://purl.allotrope.org/ontologies/result#AFR_
  AFP: http://purl.allotrope.org/ontologies/process#AFP_

default_prefix: coremeta4cat
default_range: string

imports:
  - linkml:types
  - coremeta4cat_common   # shared slots (atmosphere, temperature, drying_*, calcination_*, …) + enums

# ==================== MIXINS ====================
# Slot groups shared across multiple PreparationMethod subclasses.
# Each mixin is a pure slot container — it has no class_uri and generates
# no node shape of its own. Concrete method classes mix these in as needed.

classes:

  DryingMixin:
    mixin: true
    description: |-
      Mixin providing drying step parameters. Used by preparation methods that
      include a drying step after synthesis or precipitation
      (Impregnation, CoPrecipitation, DepositionPrecipitation,
      SonochemicalSynthesis, MolecularSynthesis).
    slots:
      - drying_device
      - has_drying_temperature
      - has_drying_duration
      - has_drying_atmosphere

  CalcinationMixin:
    mixin: true
    description: |-
      Mixin providing calcination step parameters. Used by preparation methods
      that include a thermal calcination step
      (Impregnation, CoPrecipitation, DepositionPrecipitation,
      SonochemicalSynthesis, ExsolutionSynthesis).
    slots:
      - has_calcination_temperature_range
      - has_calcination_dwelling_time
      - number_of_cycles
      - has_calcination_atmosphere
      - has_calcination_heating_rate
      - has_calcination_gas_flow_rate

  PrecipitationMixin:
    mixin: true
    description: |-
      Mixin providing precipitation and wet-chemistry step parameters. Used by
      preparation methods based on precipitation from solution
      (CoPrecipitation, DepositionPrecipitation).
    slots:
      - precipitating_agent
      - has_concentration
      - has_ph_value
      - has_mixing_speed
      - has_mixing_duration
      - has_mixing_temperature
      - order_of_addition
      - filtration
      - purification
      - has_aging_temperature
      - has_aging_duration

  ThermalSynthesisMixin:
    mixin: true
    description: |-
      Mixin providing thermal process parameters common to synthesis methods
      carried out at elevated temperature in a closed vessel or reactor
      (Solvothermal, PlasmaAssisted, CombustionSynthesis,
      MicrowaveAssisted, MechanochemicalSynthesis, Sublimation).
    slots:
      - synthesis_temperature
      - synthesis_duration
      - has_vessel_type
      - has_atmosphere

  # ==================== CORE SYNTHESIS CLASSES ====================

  Synthesis:
    is_a: DataGeneratingActivity
    class_uri: OBI:0000070   # planned process
    description: |-
      A DataGeneratingActivity in which a catalyst is prepared.

      The preparation protocol is linked via realized_plan using a
      PreparationMethod instance. Input materials (Precursors) are linked via
      had_input_entity. The resulting catalyst (CatalystSample) is linked via
      had_output_entity.

      The type of synthesis is further specified via rdf_type using an ontology
      term (e.g. a VOC4CAT preparation method term), following DCAT-AP-PLUS
      Pattern 3.
    slots:
      - nominal_composition
      - catalyst_measured_properties
      - storage_conditions
      - catalyst_support
      - solvent
      - has_sample_pretreatment
    slot_usage:
      nominal_composition:
        required: true
      catalyst_measured_properties:
        required: true
      had_input_entity:
        description: The Precursor(s) consumed during this Synthesis.
        range: Precursor
        required: true
        multivalued: true
        inlined_as_list: true
      had_output_entity:
        description: The CatalystSample produced by this Synthesis.
        range: CatalystSample
        recommended: true
        multivalued: true
        inlined_as_list: true
      realized_plan:
        description: The PreparationMethod (protocol) realized in this Synthesis.
        range: PreparationMethod
        required: true
      storage_conditions:
        recommended: true
      carried_out_by:
        description: |-
          Equipment or synthesis device used to carry out this preparation step.
          Provide a Device instance (e.g. rotary evaporator, autoclave, furnace).
        range: Device
        multivalued: true
        inlined_as_list: true

  Precursor:
    is_a: MaterialSample
    class_uri: CHEBI:52717   # precursor
    description: |-
      A MaterialSample that serves as input material in a catalyst Synthesis.
      Precursors are consumed or transformed during the preparation process.
    slots:
      - precursor_quantity
    slot_usage:
      precursor_quantity:
        required: true

  CatalystSample:
    is_a: MaterialSample
    class_uri: OBI:0000747   # specimen — reuses MaterialSample class_uri; specific catalyst type via rdf_type
    description: |-
      A MaterialSample that is the product of a catalyst Synthesis.
      The specific type of catalyst (e.g. heterogeneous, supported metal)
      is expressed via rdf_type using a VOC4CAT term.
    slot_usage:
      derived_from:
        description: |-
          The Precursor(s) or other MaterialSample from which this
          CatalystSample was produced.
        range: MaterialSample

  # ==================== PREPARATION METHOD (Plan) ====================

  PreparationMethod:
    is_a: Plan
    class_uri: OBI:0000272   # protocol
    abstract: true
    description: |-
      An abstract Plan describing the protocol used to prepare a catalyst.
      Concrete subclasses (Impregnation, CoPrecipitation, …) specify the
      method-specific parameters. Linked from Synthesis via realized_plan.

      The specific preparation method type should additionally be expressed
      via rdf_type on the Synthesis activity using a voc4cat term
      (e.g. VOC4CAT:0007016 for preparation method).

  # ---- Concrete preparation method subclasses ----

  Impregnation:
    is_a: PreparationMethod
    class_uri: VOC4CAT:0007028
    mixins:
      - DryingMixin
      - CalcinationMixin
    description: |-
      Catalyst preparation by impregnation: a solution of the active phase
      precursor is brought into contact with the support material.
    slots:
      - impregnation_type
      - impregnation_duration
      - impregnation_temperature

  CoPrecipitation:
    is_a: PreparationMethod
    class_uri: VOC4CAT:0007795
    mixins:
      - PrecipitationMixin
      - DryingMixin
      - CalcinationMixin
    description: |-
      Catalyst preparation by co-precipitation: precursor salts are
      simultaneously precipitated from solution by a precipitating agent.

  SolGel:
    is_a: PreparationMethod
    class_uri: CHMO:0001313
    mixins:
      - DryingMixin
    description: |-
      Catalyst preparation by the sol-gel process: hydrolysis and condensation
      of precursor molecules to form a colloidal network (gel).
    slots:
      - hydrolysis_ratio
      - has_aging_duration
      - drying
      - surfactant_template

  Solvothermal:
    is_a: PreparationMethod
    class_uri: CHMO:0001458
    mixins:
      - ThermalSynthesisMixin
    description: |-
      Catalyst preparation under elevated temperature and pressure in a
      sealed vessel using a non-aqueous solvent.
    slots:
      - filling_volume
      - stirrer_type
      - cooling_rate

  PlasmaAssisted:
    is_a: PreparationMethod
    class_uri: coremeta4cat:PlasmaAssisted # maybe use http://purl.obolibrary.org/obo/MS_1000400
    mixins:
      - ThermalSynthesisMixin
    description: |-
      Catalyst preparation using plasma treatment to modify surface
      properties or deposit active components.
    slots:
      - plasma_type
      - power_input
      - exposure_time
      - synthesis_pressure

  CombustionSynthesis:
    is_a: PreparationMethod
    class_uri: coremeta4cat:CombustionSynthesis # maybe use http://purl.obolibrary.org/obo/CHMO_0001473
    mixins:
      - ThermalSynthesisMixin
    description: |-
      Catalyst preparation by combustion of a fuel/oxidizer mixture,
      producing metal oxide catalysts in a single rapid step.
    slots:
      - fuel
      - oxidizer
      - fuel_to_oxidizer_ratio
      - set_temperature
      - post_treatment

  AtomicLayerDeposition:
    is_a: PreparationMethod
    class_uri: CHMO:0001311
    description: |-
      Catalyst preparation by atomic layer deposition (ALD): sequential
      self-limiting surface reactions deposit a conformal thin film
      of active phase onto a substrate.
    slots:
      - substrate
      - pulse_time
      - purging_duration
      - number_of_cycles
      - deposition_temperature
      - carrier_gas

  DepositionPrecipitation:
    is_a: PreparationMethod
    class_uri: coremeta4cat:DepositionPrecipitation
    mixins:
      - PrecipitationMixin
      - DryingMixin
      - CalcinationMixin
    description: |-
      Catalyst preparation by deposition-precipitation: the active phase
      is precipitated directly onto the support surface.
    slots:
      - deposition_temperature
      - deposition_time

  MicrowaveAssisted:
    is_a: PreparationMethod
    class_uri: CHMO:0002906
    mixins:
      - ThermalSynthesisMixin
    description: |-
      Catalyst preparation using microwave irradiation to rapidly and
      uniformly heat the reaction mixture.
    slots:
      - power
      - microwave_frequency

  SonochemicalSynthesis:
    is_a: PreparationMethod
    class_uri: coremeta4cat:SonochemicalSynthesis
    mixins:
      - DryingMixin
      - CalcinationMixin
    description: |-
      Catalyst preparation using ultrasonic irradiation to drive chemical
      reactions via acoustic cavitation.
    slots:
      - sonication_power
      - sonication_duration
      - has_temperature

  FlameSprayPyrolysis:
    is_a: PreparationMethod
    class_uri: VOC4CAT:0007031
    description: |-
      Catalyst preparation by flame spray pyrolysis (FSP): a liquid precursor
      solution is atomised and combusted in a flame to produce nanoparticles.
    slots:
      - flame_type
      - has_flow_rate
      - inlet_system
      - flame_ring
      - dispersant
      - capillary_pressure
      - fuel_dispersant_ratio
      - filtration_device
      - filter_type

  MechanochemicalSynthesis:
    is_a: PreparationMethod
    class_uri: coremeta4cat:MechanochemicalSynthesis
    mixins:
      - ThermalSynthesisMixin
    description: |-
      Catalyst preparation by mechanical milling or grinding, optionally
      combined with thermal treatment.
    slots:
      - vessel_volume
      - size_and_material
      - milling_speed
      - milling_duration
      - ball_material
      - ball_size
      - ball_to_powder_ratio

  Sublimation:
    is_a: PreparationMethod
    class_uri: coremeta4cat:Sublimation
    mixins:
      - ThermalSynthesisMixin
    description: |-
      Catalyst preparation by sublimation: a solid precursor is vaporised
      and deposited onto a substrate without passing through a liquid phase.
    slots:
      - synthesis_pressure

  MolecularSynthesis:
    is_a: PreparationMethod
    class_uri: coremeta4cat:MolecularSynthesis
    mixins:
      - DryingMixin
    description: |-
      Catalyst preparation by molecular (organometallic or coordination)
      chemistry routes, including crystallisation and purification steps.
    slots:
      - reaction_vessel
      - mixing_device
      - has_stirring_duration
      - has_stirring_speed
      - has_mixing_temperature
      - filtration_device
      - filter_type
      - crystallisation_solvents
      - precipitation_agent
      - crystallisation_duration
      - purification_solvent
      - number_of_cycles
      - temperature_ramp
      - has_atmosphere

  ExsolutionSynthesis:
    is_a: PreparationMethod
    class_uri: coremeta4cat:ExsolutionSynthesis
    mixins:
      - CalcinationMixin
    description: |-
      Catalyst preparation by exsolution: metal nanoparticles are grown on
      a perovskite oxide surface by reduction/oxidation cycling.

# ==================== SLOTS ====================
# Only slots exclusive to this subprofile are declared here.
# Shared has_X sub-slots (has_drying_temperature, has_drying_duration,
# has_calcination_temperature_range, has_calcination_dwelling_time,
# has_calcination_heating_rate, has_calcination_gas_flow_rate,
# has_stirring_speed, has_stirring_duration, has_flow_rate, …)
# are inherited from coremeta4cat_common.
# Generic has_temperature, has_concentration, has_ph_value, has_pressure
# are inherited from material_entities_ap / chemical_entities_ap.

slots:

  # ---- Synthesis-level slots ----

  nominal_composition:
    description: Nominal elemental or chemical composition of the catalyst (e.g. 5wt% Pt/Al2O3).
    range: string
    slot_uri: coremeta4cat:nominal_composition
    multivalued: true

  catalyst_measured_properties:
    description: |-
      Key measured properties of the resulting catalyst
      (e.g. BET surface area, sieve fraction, molar ratio).
    range: string
    slot_uri: coremeta4cat:catalyst_measured_properties
    multivalued: true

  storage_conditions:
    description: Conditions under which the catalyst is stored (e.g. inert atmosphere, 4°C).
    range: string
    slot_uri: VOC4CAT:0008105
    multivalued: true

  catalyst_support:
    description: Support material on which the active phase is deposited (e.g. Al2O3, SiO2).
    range: string
    slot_uri: VOC4CAT:0008104
    multivalued: true

  # ---- Precursor slots ----

  precursor_quantity:
    description: Quantity of precursor used in synthesis.
    range: Mass
    slot_uri: coremeta4cat:precursor_quantity
    multivalued: true
    inlined_as_list: true

  # ---- Impregnation-specific slots ----

  impregnation_type:
    description: Type of impregnation used (wet, dry, incipient wetness).
    range: ImpregnationTypeEnum
    slot_uri: coremeta4cat:impregnation_type
    multivalued: true

  impregnation_duration:
    description: Duration of the impregnation step.
    range: Duration
    slot_uri: coremeta4cat:impregnation_duration
    multivalued: true
    inlined_as_list: true

  impregnation_temperature:
    description: Temperature during the impregnation step.
    range: Temperature
    slot_uri: coremeta4cat:impregnation_temperature
    multivalued: true
    inlined_as_list: true

  # ---- Precipitation / wet-chemistry slots (PrecipitationMixin) ----

  precipitating_agent:
    description: Chemical agent used to induce precipitation (e.g. NaOH, NH3).
    range: ChemicalEntity
    slot_uri: coremeta4cat:precipitating_agent
    multivalued: true
    inlined_as_list: true

  # ---- Wet-chemistry / precipitation has_X sub-slots ----
  # (has_concentration and has_ph_value are inherited from chemical_entities_ap)

  has_mixing_speed:
    is_a: has_angular_velocity
    slot_uri: SIO:000008
    range: AngularVelocity
    description: Rotational speed during mixing of synthesis components.

  has_mixing_duration:
    is_a: has_duration
    slot_uri: SIO:000008
    range: Duration
    description: Duration of the mixing step.

  has_mixing_temperature:
    is_a: has_temperature
    slot_uri: SIO:000008
    range: Temperature
    description: Temperature maintained during mixing.

  has_aging_temperature:
    is_a: has_temperature
    slot_uri: SIO:000008
    range: Temperature
    description: Temperature maintained during the aging step.

  has_aging_duration:
    is_a: has_duration
    slot_uri: SIO:000008
    range: Duration
    description: Duration of the aging step.

  order_of_addition:
    description: Order in which reagents or components are combined.
    range: string
    slot_uri: coremeta4cat:order_of_addition
    multivalued: true

  filtration:
    description: Filtration method used to separate the precipitate (e.g. vacuum filtration).
    range: string
    slot_uri: coremeta4cat:filtration
    multivalued: true

  purification:
    description: Purification method applied after synthesis (e.g. washing, dialysis).
    range: string
    slot_uri: coremeta4cat:purification
    multivalued: true

  # ---- DepositionPrecipitation-specific slots ----

  deposition_temperature:
    description: Temperature during the deposition step.
    range: Temperature
    slot_uri: coremeta4cat:deposition_temperature
    multivalued: true
    inlined_as_list: true

  deposition_time:
    description: Duration of the deposition step.
    range: Duration
    slot_uri: coremeta4cat:deposition_time
    multivalued: true
    inlined_as_list: true

  # ---- ThermalSynthesisMixin slots ----

  synthesis_temperature:
    description: Temperature applied during the synthesis step.
    range: Temperature
    slot_uri: VOC4CAT:0000051
    multivalued: true
    inlined_as_list: true

  synthesis_duration:
    description: Total duration of the synthesis step.
    range: Duration
    slot_uri: VOC4CAT:0000050
    multivalued: true
    inlined_as_list: true

  synthesis_pressure:
    description: Pressure applied during synthesis (e.g. in autoclave or plasma reactor).
    range: Pressure
    slot_uri: VOC4CAT:0000053
    multivalued: true
    inlined_as_list: true

  # ---- Sol-gel-specific slots ----

  hydrolysis_ratio:
    description: Molar ratio of water to alkoxide precursor used in hydrolysis.
    range: float
    slot_uri: coremeta4cat:hydrolysis_ratio
    multivalued: true

  drying:
    description: Drying method used for the gel (e.g. supercritical drying, freeze drying).
    range: string
    slot_uri: coremeta4cat:drying
    multivalued: true

  surfactant_template:
    description: Surfactant or structure-directing agent used as a template.
    range: string
    slot_uri: coremeta4cat:surfactant_template
    multivalued: true

  # ---- Solvothermal-specific slots ----

  filling_volume:
    description: Volume of solution relative to autoclave volume (filling degree).
    range: float
    slot_uri: coremeta4cat:filling_volume
    multivalued: true
    unit:
      ucum_code: mL

  stirrer_type:
    description: Type of stirrer used (e.g. magnetic, mechanical, none).
    range: string
    slot_uri: coremeta4cat:stirrer_type
    multivalued: true

  cooling_rate:
    description: Rate at which the reactor is cooled after synthesis.
    range: HeatingRate
    slot_uri: coremeta4cat:cooling_rate
    multivalued: true
    inlined_as_list: true

  # ---- PlasmaAssisted-specific slots ----

  plasma_type:
    description: Type of plasma used (e.g. DBD, microwave, RF plasma).
    range: string
    slot_uri: coremeta4cat:plasma_type
    multivalued: true

  power_input:
    description: Power input to the plasma reactor or other energy source.
    range: PowerQuantity
    slot_uri: coremeta4cat:power_input
    multivalued: true
    inlined_as_list: true

  exposure_time:
    description: Duration of plasma or other energy exposure.
    range: Duration
    slot_uri: coremeta4cat:exposure_time
    multivalued: true
    inlined_as_list: true

  # ---- CombustionSynthesis-specific slots ----

  fuel:
    description: Organic fuel used in combustion synthesis (e.g. urea, glycine).
    range: string
    slot_uri: coremeta4cat:fuel
    multivalued: true

  oxidizer:
    description: Oxidizer used in combustion synthesis (e.g. metal nitrates).
    range: string
    slot_uri: coremeta4cat:oxidizer
    multivalued: true

  fuel_to_oxidizer_ratio:
    description: Molar ratio of fuel to oxidizer.
    range: float
    slot_uri: coremeta4cat:fuel_to_oxidizer_ratio
    multivalued: true

  set_temperature:
    description: Target temperature set for the combustion reaction.
    range: Temperature
    slot_uri: coremeta4cat:set_temperature
    multivalued: true
    inlined_as_list: true

  post_treatment:
    description: Post-synthesis treatment applied to the combustion product.
    range: string
    slot_uri: coremeta4cat:post_treatment
    multivalued: true

  # ---- AtomicLayerDeposition-specific slots ----

  substrate:
    description: Substrate material on which the ALD film is deposited.
    range: string
    slot_uri: VOC4CAT:0000024
    multivalued: true

  pulse_time:
    description: Duration of the precursor pulse in each ALD cycle.
    range: float
    slot_uri: coremeta4cat:pulse_time
    multivalued: true
    unit:
      ucum_code: s

  purging_duration:
    description: Duration of the purge step between ALD pulses.
    range: float
    slot_uri: VOC4CAT:0000112
    multivalued: true
    unit:
      ucum_code: s

  # ---- MicrowaveAssisted-specific slots ----

  power:
    description: Microwave power applied.
    range: float
    slot_uri: coremeta4cat:power
    multivalued: true
    unit:
      ucum_code: W

  microwave_frequency:
    description: Frequency of microwave irradiation.
    range: float
    slot_uri: coremeta4cat:microwave_frequency
    multivalued: true
    unit:
      ucum_code: GHz

  # ---- SonochemicalSynthesis-specific slots ----

  sonication_power:
    description: Acoustic power applied during sonication.
    range: float
    slot_uri: coremeta4cat:sonication_power
    multivalued: true
    unit:
      ucum_code: W

  sonication_duration:
    description: Duration of ultrasonic irradiation.
    range: float
    slot_uri: coremeta4cat:sonication_duration
    multivalued: true
    unit:
      ucum_code: min

  # ---- FlameSprayPyrolysis-specific slots ----

  flame_type:
    description: Type of flame used in FSP (e.g. methane/oxygen, H2/O2).
    range: string
    slot_uri: coremeta4cat:flame_type
    multivalued: true

  inlet_system:
    description: Configuration of the precursor inlet system.
    range: string
    slot_uri: coremeta4cat:inlet_system
    multivalued: true

  flame_ring:
    description: Configuration of the supporting flame ring.
    range: string
    slot_uri: coremeta4cat:flame_ring
    multivalued: true

  capillary_pressure:
    description: Pressure applied at the capillary nozzle during FSP.
    range: float
    slot_uri: coremeta4cat:capillary_pressure
    multivalued: true
    unit:
      ucum_code: bar

  fuel_dispersant_ratio:
    description: Volume ratio of fuel to dispersant used in FSP.
    range: float
    slot_uri: coremeta4cat:fuel_dispersant_ratio
    multivalued: true

  # ---- MechanochemicalSynthesis-specific slots ----

  vessel_volume:
    description: Volume of the milling vessel.
    range: float
    slot_uri: coremeta4cat:vessel_volume
    multivalued: true
    unit:
      ucum_code: mL

  size_and_material:
    description: Size and material of the milling vessel and components.
    range: string
    slot_uri: coremeta4cat:size_and_material
    multivalued: true

  milling_speed:
    description: Rotational speed during milling.
    range: float
    slot_uri: coremeta4cat:milling_speed
    multivalued: true
    unit:
      ucum_code: rpm

  milling_duration:
    description: Total duration of the milling process.
    range: float
    slot_uri: coremeta4cat:milling_duration
    multivalued: true
    unit:
      ucum_code: h

  ball_material:
    description: Material of the milling balls (e.g. zirconia, stainless steel).
    range: string
    slot_uri: coremeta4cat:ball_material
    multivalued: true

  ball_size:
    description: Diameter of the milling balls.
    range: float
    slot_uri: coremeta4cat:ball_size
    multivalued: true
    unit:
      ucum_code: mm

  ball_to_powder_ratio:
    description: Mass ratio of milling balls to powder charge.
    range: float
    slot_uri: coremeta4cat:ball_to_powder_ratio
    multivalued: true

  # ---- MolecularSynthesis-specific slots ----

  reaction_vessel:
    description: Type of reaction vessel used (e.g. Schlenk flask, round-bottom flask).
    range: string
    slot_uri: coremeta4cat:reaction_vessel
    multivalued: true

  mixing_device:
    description: Device used for mixing (e.g. magnetic stirrer, vortex mixer).
    range: string
    slot_uri: coremeta4cat:mixing_device
    multivalued: true

  crystallisation_solvents:
    description: Solvent(s) used for crystallisation.
    range: string
    slot_uri: coremeta4cat:crystallisation_solvents
    multivalued: true

  precipitation_agent:
    description: Agent used to induce precipitation in molecular synthesis.
    range: string
    slot_uri: coremeta4cat:precipitation_agent
    multivalued: true

  crystallisation_duration:
    description: Duration of the crystallisation step.
    range: float
