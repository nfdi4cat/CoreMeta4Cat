---
id: https://w3id.org/nfdi4cat/coremeta4cat/characterization/
name: coremeta4cat-characterization-ap
title: CoreMeta4cat Characterization Application Profile
description: |-
  Application profile for catalyst characterization within the CoreMeta4cat metadata model.

  This module defines:
  - Characterization — the DataGeneratingActivity in which a catalyst sample is
    analysed using an analytical technique
  - CharacterizationTechnique — the Plan (protocol) realized by Characterization
  - 24 concrete CharacterizationTechnique subclasses covering structural,
    spectroscopic, thermal, electrochemical, and chromatographic methods
  - 8 mixin classes bundling slot groups shared across multiple techniques:
      XRaySourceMixin, EnergyRangeMixin, ElectronMicroscopyMixin,
      TemperatureProgramMixin, ChromatographyMixin, MassRangeMixin,
      PhotoluminescenceMixin, ElectrochemistryMixin

  Alignment to DCAT-AP-PLUS:
    Characterization        --> is_a: DataGeneratingActivity  (prov:Activity)
    CharacterizationTechnique --> is_a: Plan                  (prov:Plan)
    Concrete techniques     --> is_a: CharacterizationTechnique (Plan subclasses)

  The specific analytical technique type is expressed via rdf_type on the
  Characterization activity using a CHMO or voc4cat term (DCAT-AP-PLUS Pattern 3),
  analogous to NMRSpectroscopy using rdf_type: CHMO:0000613.

license: CC-BY-4.0
version: 1.0.0

prefixes:
  coremeta4cat: https://w3id.org/nfdi4cat/coremeta4cat/
  VOC4CAT: https://w3id.org/nfdi4cat/voc4cat_
  dcatapplus: https://w3id.org/nfdi-de/dcat-ap-plus/
  linkml: https://w3id.org/linkml/
  prov: http://www.w3.org/ns/prov#
  OBI: http://purl.obolibrary.org/obo/OBI_
  CHMO: http://purl.obolibrary.org/obo/CHMO_
  NCIT: http://purl.obolibrary.org/obo/NCIT_
  AFR: http://purl.allotrope.org/ontologies/result#AFR_
  AFP: http://purl.allotrope.org/ontologies/process#AFP_
  AFQ: http://purl.allotrope.org/ontologies/quality#AFQ_
  AFRL: http://purl.allotrope.org/ontologies/role#AFRL_
  ENM: http://purl.enanomapper.org/onto/

default_prefix: coremeta4cat
default_range: string

imports:
  - linkml:types
  - coremeta4cat_common   # shared has_X sub-slots, atmosphere, enums

# ==================== MIXINS ====================
# Pure slot containers. Each targets a slot group shared by >=2 techniques.
# No class_uri — mixins generate no node shapes of their own.

classes:

  XRaySourceMixin:
    mixin: true
    description: |-
      Mixin providing X-ray source and monochromator slots, shared by all
      X-ray based techniques (PowderXRD, XRayAbsorptionSpectroscopy, XPS,
      SingleCrystalXRD).
    slots:
      - xray_source
      - monochromator

  EnergyRangeMixin:
    mixin: true
    description: |-
      Mixin providing energy scan range slots, shared by X-ray spectroscopy
      techniques that scan over an energy range (XRayAbsorptionSpectroscopy, XPS).
    slots:
      - has_energy_range

  ElectronMicroscopyMixin:
    mixin: true
    description: |-
      Mixin providing electron gun and image parameters shared by electron
      microscopy techniques (TransmissionElectronMicroscopy,
      ScanningElectronMicroscopy).
    slots:
      - gun_type
      - acceleration_voltage
      - magnification_setting

  TemperatureProgramMixin:
    mixin: true
    description: |-
      Mixin providing temperature-programme parameters shared by thermal
      analysis and temperature-programmed reaction techniques
      (Thermogravimetry, TPO, TPR).
    slots:
      - has_temperature_range
      - has_heating_rate
      - has_heating_procedure

  ChromatographyMixin:
    mixin: true
    description: |-
      Mixin providing chromatographic separation parameters shared by
      separation techniques (GCMS, SizeExclusionChromatography, HPLC_MS).
    slots:
      - column_type
      - eluent
      - has_flow_rate
      - has_injection_volume
      - external_standard
      - internal_standard

  MassRangeMixin:
    mixin: true
    description: |-
      Mixin providing mass-to-charge scan range slots shared by mass
      spectrometry techniques (GCMS, ESI_MS).
    slots:
      - has_mz_range

  PhotoluminescenceMixin:
    mixin: true
    description: |-
      Mixin providing optical excitation/emission parameters shared by
      photoluminescence techniques (PhotoluminescenceSpectroscopy,
      PhotoluminescenceLifetime).
    slots:
      - excitation_wavelength
      - emission_wavelength
      - optical_filter
      - has_temperature

  ElectrochemistryMixin:
    mixin: true
    description: |-
      Mixin providing electrochemical cell parameters shared by
      electrochemical characterization techniques (CyclicVoltammetry,
      ConductivityMeasurement).
    slots:
      - reference_electrode
      - working_electrode
      - counter_electrode
      - electrolyte_composition
      - electrolyte_concentration
      - has_atmosphere
      - has_temperature

  # ==================== CHARACTERIZATION ACTIVITY ====================

  Characterization:
    is_a: DataGeneratingActivity
    class_uri: OBI:0000070   # planned process; specific technique via rdf_type
    description: |-
      A DataGeneratingActivity in which a catalyst sample or catalytic material
      is characterized using an analytical technique.

      The catalyst sample being characterized is linked via evaluated_entity.
      The analytical protocol is linked via realized_plan using a
      CharacterizationTechnique instance. The instrument used is linked via
      carried_out_by as a Device.

      The specific technique type is expressed via rdf_type using an ontology
      term (e.g. CHMO:0000158 for powder XRD, CHMO:0000404 for XPS),
      following DCAT-AP-PLUS Pattern 3 — exactly as NMRSpectroscopy uses
      rdf_type: CHMO:0000613.
    slots:
      - sample_state
      - sample_description
      - sample_preparation
      - has_sample_pretreatment
      - detector_type
    slot_usage:
      carried_out_by:
        description: |-
          The analytical instrument used to carry out this characterization.
          Provide a Device instance (e.g. XRD diffractometer, TEM, NMR spectrometer).
        range: Device
        required: true
        multivalued: true
        inlined_as_list: true
      evaluated_entity:
        description: The catalyst sample or material being characterized.
        range: EvaluatedEntity
        recommended: true
        multivalued: true
        inlined_as_list: true
      realized_plan:
        description: The CharacterizationTechnique (protocol) realized in this Characterization.
        range: CharacterizationTechnique
        required: true
      rdf_type:
        description: |-
          The type of characterization technique as an ontology term, e.g.
          CHMO:0000158 (powder XRD), CHMO:0000404 (XPS), VOC4CAT:0000075 (SEM).
        recommended: true

  # ==================== CHARACTERIZATION TECHNIQUE (Plan) ====================

  CharacterizationTechnique:
    is_a: Plan
    class_uri: OBI:0000272   # protocol
    abstract: true
    description: |-
      An abstract Plan describing the analytical protocol used to characterize
      a catalyst. Concrete subclasses specify technique-specific parameters.
      Linked from Characterization via realized_plan.

  # ==================== STRUCTURAL / DIFFRACTION ====================

  PowderXRD:
    is_a: CharacterizationTechnique
    class_uri: CHMO:0000158
    mixins:
      - XRaySourceMixin
    description: Powder X-ray diffraction for phase identification and structural analysis.
    slots:
      - has_two_theta_range
      - step_size
      - has_operation_mode
      - has_atmosphere
      - has_temperature
      - sample_spinning_speed
      - has_experiment_duration

  SingleCrystalXRD:
    is_a: CharacterizationTechnique
    class_uri: CHMO:0000852
    mixins:
      - XRaySourceMixin
    description: Single crystal X-ray diffraction for structure determination.
    slots:
      - has_temperature

  # ==================== X-RAY SPECTROSCOPY ====================

  XRayAbsorptionSpectroscopy:
    is_a: CharacterizationTechnique
    class_uri: VOC4CAT:0000286
    mixins:
      - XRaySourceMixin
      - EnergyRangeMixin
    description: X-ray absorption spectroscopy (XAS/XANES/EXAFS) for electronic and local structure analysis.
    slots:
      - has_operation_mode
      - element_analyzed
      - absorption_edge
      - energy_resolution
      - has_temperature
      - beamline_source
      - noise_of_measurement
      - number_of_cycles

  XPS:
    is_a: CharacterizationTechnique
    class_uri: CHMO:0000404
    mixins:
      - XRaySourceMixin
      - EnergyRangeMixin
    description: X-ray photoelectron spectroscopy for surface elemental and chemical state analysis.
    slots:
      - total_acquisition_time
      - number_of_scans
      - step_size
      - pass_energy
      - spot_size
      - lense_mode
      - charge_compensation
      - has_atmosphere

  EDX:
    is_a: CharacterizationTechnique
    class_uri: CHMO:0000309
    description: Energy-dispersive X-ray spectroscopy for elemental mapping and quantification.
    slots:
      - primary_energy
      - counting_time
      - resolution
      - calibration_method

  # ==================== VIBRATIONAL SPECTROSCOPY ====================

  InfraredSpectroscopy:
    is_a: CharacterizationTechnique
    class_uri: CHMO:0000630
    description: Infrared spectroscopy (FTIR/ATR) for functional group and surface species identification.
    slots:
      - has_operation_mode
      - has_wavenumber_range
      - step_size
      - has_temperature
      - background_correction
      - number_of_scans
      - has_atmosphere

  DRIFTS:
    is_a: CharacterizationTechnique
    class_uri: CHMO:0000645
    description: |-
      Diffuse reflectance infrared Fourier transform spectroscopy for in-situ
      surface species identification under reactive gas conditions.
    slots:
      - adsorption_gas
      - has_atmosphere
      - has_flow_rate
      - has_wavenumber_range
      - diluting_reference
      - ratio_reference_sample
      - step_size
      - resolution
      - background_correction_method
      - has_temperature
      - number_of_scans

  RamanSpectroscopy:
    is_a: CharacterizationTechnique
    class_uri: VOC4CAT:0000069
    description: Raman spectroscopy for vibrational and structural characterization.
    slots:
      - excitation_laser_wavelength
      - excitation_laser_power
      - magnification_setting
      - has_integration_time
      - number_of_scans
      - has_atmosphere
      - has_temperature
      - filter_or_grating

  # ==================== NMR SPECTROSCOPY ====================

  NMRSpectroscopy:
    is_a: CharacterizationTechnique
    class_uri: VOC4CAT:0000073
    description: |-
      Nuclear magnetic resonance spectroscopy for structure elucidation.
      Note: for detailed liquid-state NMR minimum information, the dedicated
      nmr_dcat_ap profile (MARGARITAS) should be used in combination with
      this subprofile.
    slots:
      - nucleus
      - solvent
      - irradiation_frequency
      - has_temperature
      - nmr_pulse_sequence
      - nmr_sample_tube
      - number_of_scans
      - has_atmosphere

  # ==================== ELECTRON MICROSCOPY ====================

  TransmissionElectronMicroscopy:
    is_a: CharacterizationTechnique
    class_uri: VOC4CAT:0000078
    mixins:
      - ElectronMicroscopyMixin
    description: TEM for atomic-resolution imaging and diffraction of catalyst particles.
    slots:
      - has_operation_mode

  ScanningElectronMicroscopy:
    is_a: CharacterizationTechnique
    class_uri: VOC4CAT:0000075
    mixins:
      - ElectronMicroscopyMixin
    description: SEM for surface morphology and particle size/shape imaging.
    slots:
      - image_resolution
      - field_emitter

  # ==================== THERMAL ANALYSIS ====================

  Thermogravimetry:
    is_a: CharacterizationTechnique
    class_uri: CHMO:0000690
    mixins:
      - TemperatureProgramMixin
    description: Thermogravimetric analysis (TGA/DTG) for mass loss, decomposition, and oxidation state characterization.
    slots:
      - has_operation_mode
      - has_atmosphere
      - initial_temperature
      - final_temperature
      - has_sample_mass

  TPR:
    is_a: CharacterizationTechnique
    class_uri: CHMO:0002908
    mixins:
      - TemperatureProgramMixin
    description: Temperature-programmed reduction for reducibility and metal-support interaction characterization.
    slots:
      - reducing_gas_composition

  TPO:
    is_a: CharacterizationTechnique
    class_uri: CHMO:0002907
    mixins:
      - TemperatureProgramMixin
    description: Temperature-programmed oxidation for coke quantification and reoxidation characterization.
    slots:
      - oxidizing_gas_composition

  # ==================== SURFACE AREA AND POROSITY ====================

  BET:
    is_a: CharacterizationTechnique
    class_uri: ENM:0000064
    description: Brunauer-Emmett-Teller analysis for specific surface area and pore size distribution.
    slots:
      - adsorbate_gas
      - degassing_temperature
      - measurement_temperature
      - pore_size_distribution_method
      - has_sample_mass

  # ==================== ELEMENTAL ANALYSIS ====================

  ICPAES:
    is_a: CharacterizationTechnique
    class_uri: CHMO:0000267
    description: Inductively coupled plasma atomic emission spectroscopy for bulk elemental composition.
    slots:
      - element_analyzed
      - calibration_method
      - detection_limit
      - matrix_effect_correction

  ElementalAnalysis:
    is_a: CharacterizationTechnique
    class_uri: CHMO:0001075
    description: Combustion elemental analysis (CHNS/O) for carbon, hydrogen, nitrogen, sulfur content.
    slots:
      - elements_analyzed
      - combustion_temperature
      - carrier_gas

  # ==================== OPTICAL SPECTROSCOPY ====================

  UVVisSpectroscopy:
    is_a: CharacterizationTechnique
    class_uri: VOC4CAT:0000079
    description: UV-Vis spectroscopy for electronic transitions, band gap, and concentration determination.
    slots:
      - minimum_wavelength
      - maximum_wavelength
      - path_length
      - solvent
      - has_concentration

  PhotoluminescenceSpectroscopy:
    is_a: CharacterizationTechnique
    class_uri: CHMO:0000773
    mixins:
      - PhotoluminescenceMixin
    description: Photoluminescence spectroscopy for defect and charge carrier characterization.
    slots:
      - emission_range
      - slit_width
      - step_size
      - has_integration_time

  PhotoluminescenceLifetime:
    is_a: CharacterizationTechnique
    class_uri: CHMO:0001917
    mixins:
      - PhotoluminescenceMixin
    description: Time-resolved photoluminescence for charge carrier lifetime and recombination dynamics.
    slots:
      - lifetime_fitting_model
      - number_of_shots

  # ==================== ELECTROCHEMICAL ====================

  CyclicVoltammetry:
    is_a: CharacterizationTechnique
    class_uri: CHMO:0000025
    mixins:
      - ElectrochemistryMixin
    description: Cyclic voltammetry for electrochemical activity, redox potential, and capacitance characterization.
    slots:
      - scan_rate
      - minimum_potential
      - maximum_potential
      - step_size_potential
      - number_of_cycles

  ConductivityMeasurement:
    is_a: CharacterizationTechnique
    class_uri: CHMO:0000010
    mixins:
      - ElectrochemistryMixin
    description: Electrical conductivity measurement for ionic and electronic transport characterization.
    slots:
      - electrode_configuration
      - ac_frequency
      - ac_dc_mode
      - sample_geometry

  # ==================== PARTICLE SIZE ====================

  DynamicLightScattering:
    is_a: CharacterizationTechnique
    class_uri: CHMO:0000167
    description: Dynamic light scattering for hydrodynamic particle size distribution in suspension.
    slots:
      - solvent
      - has_concentration
      - light_wavelength
      - scattering_angle
      - refractive_index
      - has_temperature
      - dispersant
      - measurement_duration

  # ==================== MASS SPECTROMETRY ====================

  ElectroSprayIonizationMassSpectrometry:
    is_a: CharacterizationTechnique
    class_uri: CHMO:0000482
    mixins:
      - MassRangeMixin
    description: Electrospray ionisation mass spectrometry for molecular mass and identity determination.
    slots:
      - has_operation_mode
      - spray_voltage
      - capillary_temperature
      - solvent_composition
      - has_flow_rate
      - carrier_gas
      - has_concentration

  # ==================== CHROMATOGRAPHY ====================

  GCMS:
    is_a: CharacterizationTechnique
    class_uri: CHMO:0000497
    mixins:
      - ChromatographyMixin
      - MassRangeMixin
    description: Gas chromatography-mass spectrometry for volatile compound identification and quantification.
    slots:
      - carrier_gas
      - carrier_gas_purity
      - inlet_temperature
      - minimum_oven_temperature
      - maximum_oven_temperature
      - heating_ramp
      - has_heating_procedure
      - acquisition_mode
      - solvent_delay
      - trace_ion_detection
      - split_ratio

  SizeExclusionChromatography:
    is_a: CharacterizationTechnique
    class_uri: AFP:0000843
    mixins:
      - ChromatographyMixin
    description: Size exclusion chromatography for molecular weight distribution determination.
    slots:
      - has_temperature
      - calibration_standard

  HighPerformanceLiquidChromatographyMassSpectrometry:
    is_a: CharacterizationTechnique
    class_uri: CHMO:0000796
    mixins:
      - ChromatographyMixin
    description: High-performance liquid chromatography-mass spectrometry for compound identification and quantification.
    slots:
      - gradient_program
      - ionization_mode
      - has_temperature

# ==================== SLOTS ====================
# Only slots exclusive to this subprofile are declared here.
# Shared has_X sub-slots (has_temperature, has_flow_rate, has_injection_volume,
# has_heating_rate, has_sample_mass, has_integration_time, has_experiment_duration,
# has_concentration) and shared string slots (atmosphere, step_size, resolution,
# number_of_scans, operation_mode, solvent, external_standard, internal_standard,
# calibration_method, column_type, heating_procedure, dispersant, …)
# are inherited from coremeta4cat_common / material_entities_ap / chemical_entities_ap.
#
# QuantitativeRange collapse slots defined here:
#   has_energy_range, has_temperature_range, has_mz_range,
#   has_two_theta_range, has_wavenumber_range

slots:

  # ---- Characterization-level slots ----

  sample_state:
    description: Physical state of the sample during characterization.
    range: SampleStateEnum
    slot_uri: coremeta4cat:sample_state
    multivalued: true

  sample_description:
    description: Free-text description of the sample used in this characterization.
    range: string
    slot_uri: coremeta4cat:sample_description
    multivalued: true

  sample_preparation:
    description: Sample preparation steps applied immediately before measurement.
    range: string
    slot_uri: AFP:0001159
    multivalued: true

  detector_type:
    description: Type of detector used in the measurement.
    range: string
    slot_uri: AFR:0000317
    multivalued: true

  # ---- X-ray source / optics (XRaySourceMixin) ----

  xray_source:
    description: X-ray source used (e.g. Cu K-alpha, Mo K-alpha, synchrotron).
    range: string
    slot_uri: OBI:0001138
    multivalued: true

  monochromator:
    description: Monochromator type or configuration used.
    range: string
    slot_uri: CHMO:0002120
    multivalued: true

  # ---- Energy range (EnergyRangeMixin) ----

  has_energy_range:
    slot_uri: coremeta4cat:hasEnergyRange
    range: QuantitativeRange
    description: |-
      Energy scan range (minimum → maximum) as a QuantitativeRange.
      Provide unit as a QUDT term (e.g. eV, keV).
    inlined: true

  # ---- Electron microscopy (ElectronMicroscopyMixin) ----

  gun_type:
    description: Type of electron gun (e.g. FEG, thermionic LaB6).
    range: string
    slot_uri: coremeta4cat:gun_type
    multivalued: true

  acceleration_voltage:
    description: Acceleration voltage applied to the electron beam.
    range: ElectricPotential
    slot_uri: coremeta4cat:acceleration_voltage
    multivalued: true
    inlined_as_list: true

  magnification_setting:
    description: Magnification setting used for imaging.
    range: float
    slot_uri: AFR:0002226
    multivalued: true

  # ---- Temperature programme (TemperatureProgramMixin) ----

  has_temperature_range:
    slot_uri: coremeta4cat:hasTemperatureRange
    range: QuantitativeRange
    description: |-
      Temperature programme range (start → final temperature) as a QuantitativeRange.
      Provide unit as a QUDT term (e.g. Degree Celsius, Kelvin).
    inlined: true

  initial_temperature:
    description: Initial temperature at the start of a thermal analysis run.
    range: Temperature
    slot_uri: NCIT:C164644
    multivalued: true
    inlined_as_list: true

  final_temperature:
    description: Final temperature at the end of a thermal analysis run.
    range: Temperature
    slot_uri: NCIT:C164644
    multivalued: true
    inlined_as_list: true

  # ---- Mass spectrometry range (MassRangeMixin) ----

  has_mz_range:
    slot_uri: coremeta4cat:hasMzRange
    range: QuantitativeRange
    description: |-
      Mass-to-charge ratio scan range (minimum → maximum m/z) as a QuantitativeRange.
      The unit for m/z is dimensionless (Thomson); set unit to the appropriate QUDT term.
    inlined: true

  # ---- Photoluminescence (PhotoluminescenceMixin) ----

  excitation_wavelength:
    description: Excitation wavelength used in photoluminescence measurement.
    range: LengthQuantity
    slot_uri: AFR:0002479
    multivalued: true
    inlined_as_list: true

  emission_wavelength:
    description: Emission wavelength detected in photoluminescence measurement.
    range: LengthQuantity
    slot_uri: NCIT:C204101
    multivalued: true
    inlined_as_list: true

  optical_filter:
    description: Optical filter used in the emission or excitation path.
    range: string
    slot_uri: coremeta4cat:optical_filter
    multivalued: true

  # ---- Electrochemistry (ElectrochemistryMixin) ----

  reference_electrode:
    description: Reference electrode used in electrochemical cell (e.g. Ag/AgCl, RHE).
    range: string
    slot_uri: VOC4CAT:0007204
    multivalued: true

  working_electrode:
    description: Working electrode used in electrochemical cell.
    range: string
    slot_uri: VOC4CAT:0007202
    multivalued: true

  counter_electrode:
    description: Counter electrode used in electrochemical cell.
    range: string
    slot_uri: VOC4CAT:0007203
    multivalued: true

  electrolyte_composition:
    description: Chemical composition of the electrolyte solution.
    range: string
    slot_uri: coremeta4cat:electrolyte_composition
    multivalued: true

  electrolyte_concentration:
    description: Concentration of the electrolyte.
    range: Concentration
    slot_uri: coremeta4cat:electrolyte_concentration
    multivalued: true
    inlined_as_list: true

  # ---- PowderXRD-specific ----

  has_two_theta_range:
    slot_uri: coremeta4cat:hasTwoThetaRange
    range: QuantitativeRange
    description: |-
      2theta diffraction scan range (minimum → maximum 2θ angle) as a QuantitativeRange.
      Provide unit as a QUDT term (e.g. Degree).
    inlined: true

  sample_spinning_speed:
    description: Sample spinning speed during XRD measurement.
    range: AngularVelocity
    slot_uri: coremeta4cat:sample_spinning_speed
    multivalued: true
    inlined_as_list: true

  # ---- XAS-specific ----

  absorption_edge:
    description: X-ray absorption edge measured (e.g. K-edge, L3-edge).
    range: string
    slot_uri: coremeta4cat:absorption_edge
    multivalued: true

  element_analyzed:
    description: Chemical element analysed (e.g. Fe, Cu, Pt).
    range: string
    slot_uri: coremeta4cat:element_analyzed
    multivalued: true

  beamline_source:
    description: Synchrotron beamline or X-ray source identifier.
    range: string
    slot_uri: coremeta4cat:beamline_source
    multivalued: true

  noise_of_measurement:
    description: Noise level of the XAS measurement (signal-to-noise ratio).
    range: float
    slot_uri: coremeta4cat:noise_of_measurement
    multivalued: true

  energy_resolution:
    description: Energy resolution of the spectrometer or monochromator.
    range: EnergyQuantity
    slot_uri: AFR:0000950
    multivalued: true
    inlined_as_list: true

  # ---- XPS-specific ----

  total_acquisition_time:
    description: Total time for XPS spectrum acquisition.
    range: Duration
    slot_uri: coremeta4cat:total_acquisition_time
    multivalued: true
    inlined_as_list: true

  pass_energy:
    description: Analyser pass energy setting in XPS.
    range: EnergyQuantity
    slot_uri: coremeta4cat:pass_energy
    multivalued: true
    inlined_as_list: true

  spot_size:
    description: X-ray spot size on the sample surface.
    range: LengthQuantity
    slot_uri: coremeta4cat:spot_size
    multivalued: true
    inlined_as_list: true

  lense_mode:
    description: Electron lens mode setting in XPS analyser.
    range: string
    slot_uri: VOC4CAT:0000108
    multivalued: true

  charge_compensation:
    description: Charge compensation method applied during XPS measurement.
    range: string
    slot_uri: coremeta4cat:charge_compensation
    multivalued: true

  # ---- EDX-specific ----

  primary_energy:
    description: Primary electron beam energy for EDX excitation.
    range: EnergyQuantity
    slot_uri: coremeta4cat:primary_energy
    multivalued: true
    inlined_as_list: true

  counting_time:
    description: X-ray counting time per point or spectrum.
    range: Duration
    slot_uri: coremeta4cat:counting_time
    multivalued: true
    inlined_as_list: true

  # ---- IR/DRIFTS-specific ----

  has_wavenumber_range:
    slot_uri: coremeta4cat:hasWavenumberRange
    range: QuantitativeRange
    description: |-
      Infrared wavenumber scan range (minimum → maximum cm⁻¹) as a QuantitativeRange.
      Provide unit as a QUDT term (e.g. ReciprocalCentimetre).
    inlined: true

  background_correction:
    description: Background correction method applied to IR spectra.
    range: string
    slot_uri: AFP:0003721
    multivalued: true

  adsorption_gas:
    description: Probe gas adsorbed during in-situ DRIFTS measurement.
    range: ChemicalEntity
