  Simulation:
    name: Simulation
    definition_uri: https://w3id.org/nfdi4cat/coremeta4cat/Simulation
    description: 'A DataGeneratingActivity in which a catalyst, catalytic material,
      or

      catalytic process is modelled computationally.


      The simulation software is linked via carried_out_by as a Software agent.

      The simulation method (protocol) is linked via realized_plan using a

      SimulationMethod instance. The catalyst model or reaction being simulated

      is linked via evaluated_entity or evaluated_activity.


      The specific simulation type is expressed via rdf_type (e.g. coremeta4cat:DFT,

      NCIT:C18097 for molecular dynamics), following DCAT-AP-PLUS Pattern 3.'
    from_schema: https://w3id.org/nfdi4cat/coremeta4cat/simulation/
    mappings:
    - NCIT:C48936
    is_a: DataGeneratingActivity
    slots:
    - id
    - Activity_title
    - Activity_description
    - Activity_other_identifier
    - Activity_has_part
    - Activity_had_input_entity
    - Activity_had_output_entity
    - Activity_had_input_activity
    - Activity_has_qualitative_attribute
    - Activity_has_quantitative_attribute
    - Activity_part_of
    - ClassifierMixin_type
    - evaluated_activity
    - occurred_in
    - software_package
    - calculated_property
    - Simulation_rdf_type
    - Simulation_realized_plan
    - Simulation_carried_out_by
    - Simulation_evaluated_entity
    slot_usage:
      rdf_type:
        name: rdf_type
        description: 'The type of simulation method as an ontology term (e.g. coremeta4cat:DFT,

          NCIT:C18097 for MD, coremeta4cat:Microkinetics). This is the primary

          machine-actionable classification of the simulation type.'
        recommended: true
      realized_plan:
        name: realized_plan
        description: The SimulationMethod (protocol) realized in this Simulation.
        range: SimulationMethod
        required: true
      carried_out_by:
        name: carried_out_by
        description: The simulation software used, provided as a Software agent instance.
        range: AgenticEntity
        recommended: true
        multivalued: true
        inlined_as_list: true
      evaluated_entity:
        name: evaluated_entity
        description: The catalyst model, surface slab, or molecule being simulated.
        range: EvaluatedEntity
        recommended: true
        multivalued: true
        inlined_as_list: true
    class_uri: NCIT:C48936
  SimulationMethod:
    name: SimulationMethod
    definition_uri: https://w3id.org/nfdi4cat/coremeta4cat/SimulationMethod
    description: 'Abstract Plan describing the computational method (protocol) used
      in a

      Simulation. Concrete subclasses carry method-specific parameter slots.

      Linked from Simulation via realized_plan.'
