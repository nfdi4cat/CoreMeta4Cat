    - domain_agnostic_core
    from_schema: https://w3id.org/nfdi-de/dcat-ap-plus/
    reachable_from:
      source_ontology: http://qudt.org/2.1/vocab/quantitykind
      source_nodes:
      - qudt:QuantityKind
      relationship_types:
