name: coremeta4cat-metadata
description: "The CoreMeta4Cat describes the minimum information which must be reported\
  \ with research\ndata concerning the field of catalysis. This guideline helps to\
  \ handle and\nstandardize data based on the FAIR principle (Findable, Accessible,\
  \ Interoperable,\nReusable).\n\nArchitecture\n------------\nCoreMeta4Cat follows\
  \ the DCAT-AP-PLUS design patterns (see design-patterns.md):\n\n- The entry point\
  \ is the dcat:Dataset, extended here as CatalysisDataset.\n  The catalysis research\
  \ field is expressed via rdf_type (ClassifierMixin,\n  Pattern 3) using voc4cat\
  \ terms \u2014 analogous to how NMRSpectroscopy uses\n  rdf_type: CHMO:0000613 to\
  \ classify the measurement type.\n\n- The four CoreMeta4Cat pillars are modelled\
  \ as DCAT-AP-PLUS Activity subclasses,\n  following the same pattern as NMRSpectroscopy\
  \ (is_a: DataGeneratingActivity):\n\n    Synthesis      --> is_a: DataGeneratingActivity\n\
  \                     Produces a catalyst (MaterialSample) as had_output_entity.\n\
  \                     The PreparationMethod (protocol) is linked via realized_plan.\n\
  \n    Characterization --> is_a: DataGeneratingActivity\n                      \
  \ Produces measurement data about a catalyst or reaction.\n                    \
  \   The catalyst/sample is the evaluated_entity.\n                       The CharacterizationTechnique\
  \ is linked via realized_plan.\n\n    Reaction       --> is_a: EvaluatedActivity\n\
  \                     The catalytic process being studied, NOT a data-generating\n\
  \                     activity itself. Characterization datasets are about this.\n\
  \                     Analogous to the reaction being observed in a reaction\n \
  \                    monitoring dataset.\n\n    Simulation     --> is_a: DataGeneratingActivity\n\
  \                     Generates computational data about a catalyst or reaction.\n\
  \                     The SimulationMethod (protocol) is linked via realized_plan.\n\
  \                     The simulation software is carried_out_by: Software.\n\n-\
  \ Catalyst samples and precursor materials are modelled as MaterialSample\n  (from\
  \ material_entities_ap), which is an EvaluatedEntity.\n\n- Reactors and instruments\
  \ are modelled as Device (from dcat_ap_plus), which\n  is an AgenticEntity carried_out_by\
  \ the relevant Activity.\n\n- PreparationMethod, CharacterizationTechnique, and\
  \ SimulationMethod are\n  modelled as Plan (from dcat_ap_plus), the protocol realized\
  \ by the Activity.\n\nThis file is the top-level aggregator. It imports coremeta4cat_common\
  \ (shared\nslots and enums) and the four subprofile modules.\n\nFull import hierarchy:\n\
  \  coremeta4cat.yaml  (this file \u2014 aggregator + CatalysisDataset entry point)\n\
  \    +-- coremeta4cat_common.yaml         (shared slots, enums)\n          +-- chem_dcat_ap\
  \          (SubstanceSample, ChemicalSubstance, \u2026)\n                +-- chemical_reaction_ap\n\
  \                      +-- chemical_entities_ap\n                            +--\
  \ material_entities_ap\n                                  +-- dcat_ap_plus  (DCAT-AP-PLUS\
  \ base)\n    +-- coremeta4cat_synthesis_ap         (Step 3 \u2014 Synthesis, PreparationMethod,\
  \ mixins)\n    +-- coremeta4cat_characterization_ap  (Step 4 \u2014 Characterization,\
  \ 24 techniques, mixins)\n    +-- coremeta4cat_reaction_ap          (Step 5 \u2014\
  \ Reaction, 8 ReactorDesignTypes)\n    +-- coremeta4cat_simulation_ap        (Step\
  \ 6 \u2014 Simulation, 4 methods, 12 properties, mixins)"
