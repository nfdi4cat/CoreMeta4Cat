    description: A piece of information that is attributed to an Entity, Activity
      or AgenticEntity.
    in_subset:
    - domain_agnostic_core
    from_schema: https://w3id.org/nfdi-de/dcat-ap-plus/
    mappings:
    - prov:Entity
    mixins:
    - ClassifierMixin
    slots:
    - title
    - description
    - QualitativeAttribute_value
    - ClassifierMixin_type
    - rdf_type
    slot_usage:
      value:
        name: value
        description: The slot to provide the literal value of the QualitativeAttribute.
        required: true
    class_uri: prov:Entity
  QuantitativeAttribute:
    name: QuantitativeAttribute
    definition_uri: https://w3id.org/nfdi-de/dcat-ap-plus/QuantitativeAttribute
    description: A quantifiable piece of information that is attributed to an Entity,
      Activity or AgenticEntity.
    in_subset:
    - domain_agnostic_core
    from_schema: https://w3id.org/nfdi-de/dcat-ap-plus/
    mappings:
    - qudt:Quantity
    mixins:
    - ClassifierMixin
    slots:
    - title
    - description
    - QuantitativeAttribute_value
    - quantitativeAttribute__has_quantity_type
    - quantitativeAttribute__unit
    - ClassifierMixin_type
    - rdf_type
    slot_usage:
      value:
        name: value
        description: The slot to provide the literal value of the QuantitativeAttribute.
        range: float
        required: true
    attributes:
      has_quantity_type:
        name: has_quantity_type
        description: The type of quality that is quantifiable according to the QUDT
          ontology.
        slot_uri: qudt:hasQuantityKind
        range: DefinedTerm
        bindings:
        - range: QUDTQuantityKindEnum
          obligation_level:
            text: RECOMMENDED
            description: The metadata element is recommended to be present in the
              model
          binds_value_of: id
          description: Binds the type of a quantifiable attribute to a QUDT Quantity
            Kind instance from the QUDT Quantity Kind vocabulary.
        required: true
      unit:
        name: unit
        slot_uri: qudt:unit
        range: DefinedTerm
        bindings:
        - range: QUDTUnitEnum
          obligation_level:
            text: RECOMMENDED
            description: The metadata element is recommended to be present in the
              model
          binds_value_of: id
          description: Restricts the allowable defined terms to the QUDT Unit vocabulary.
        recommended: true
    class_uri: qudt:Quantity
