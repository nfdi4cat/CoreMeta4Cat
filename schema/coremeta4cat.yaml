  Reaction:
    name: Reaction
    definition_uri: https://w3id.org/nfdi4cat/coremeta4cat/Reaction
    description: "An EvaluatedActivity representing the catalytic reaction being studied.\n\
      \nReaction is NOT a DataGeneratingActivity \u2014 it is the catalytic process\n\
      being observed, not the process that generates the dataset. A CatalysisDataset\n\
      is linked to the Reaction it is about via is_about_activity.\n\nFor operando\
      \ experiments (e.g. in-situ XRD during a reaction), the dataset\ncarries both:\n\
      \  was_generated_by: Characterization  (the measurement producing data)\n  is_about_activity:\
      \ Reaction         (the catalytic process being monitored)\n\nThe reactor is\
      \ linked via carried_out_by as a ReactorDesignType (Device).\nReactants are\
      \ linked via had_input_entity. The type of catalytic reaction\n(e.g. ammonia\
      \ synthesis, CO oxidation) is expressed via rdf_type using a\nvoc4cat or ChemO\
      \ term."
    from_schema: https://w3id.org/nfdi4cat/coremeta4cat/reaction/
    mappings:
    - SIO:010345
    is_a: EvaluatedActivity
    slots:
    - id
    - Activity_title
    - Activity_description
    - Activity_has_part
    - Activity_had_output_entity
    - Activity_had_input_activity
    - Activity_has_qualitative_attribute
    - Activity_has_quantitative_attribute
    - Activity_part_of
    - ClassifierMixin_type
    - EvaluatedActivity_other_identifier
    - catalyst_quantity
    - reactant
    - catalyst_type
    - reactor_temperature_range
    - atmosphere
    - experiment_pressure
    - feed_composition_range
    - experiment_duration
    - Reaction_product_identification_method
    - Reaction_rdf_type
    - Reaction_carried_out_by
    - Reaction_had_input_entity
    slot_usage:
      rdf_type:
        name: rdf_type
        description: 'The type of catalytic reaction as an ontology term (e.g. VOC4CAT:0007010

          for a specific reaction type, or a ChemO/RXNO term).'
        recommended: true
      carried_out_by:
        name: carried_out_by
        description: 'The reactor in which the Reaction takes place, provided as a

          ReactorDesignType (Device) instance.'
        range: ReactorDesignType
        required: true
        multivalued: true
        inlined_as_list: true
      had_input_entity:
        name: had_input_entity
        description: The reactant chemicals or feeds entering the reactor.
        range: EvaluatedEntity
        recommended: true
        multivalued: true
        inlined_as_list: true
      product_identification_method:
        name: product_identification_method
        description: 'The analytical method used to identify and/or quantify reaction
          products.

          Should reference a CharacterizationTechnique instance (e.g. a GCMS or

          HPLC_MS object from coremeta4cat_characterization_ap). The abstract stub

          ProductIdentificationMethod is retained for backward compatibility.'
        range: ProductIdentificationMethod
        required: true
        multivalued: true
        inlined_as_list: true
    class_uri: SIO:010345
  ProductIdentificationMethod:
    name: ProductIdentificationMethod
    definition_uri: https://w3id.org/nfdi4cat/coremeta4cat/ProductIdentificationMethod
    description: 'Abstract Plan representing the method used to identify and quantify
      reaction

      products. In practice, users should reference a concrete CharacterizationTechnique

      subclass from coremeta4cat_characterization_ap (e.g. GCMS, HPLC_MS, NMRSpectroscopy).


      This abstract class is retained for backward compatibility with the original

      CoreMeta4Cat monolith. It is a subclass of Plan (prov:Plan / OBI:0000272) so
      that

      it can participate in the realized_plan slot if needed.'
