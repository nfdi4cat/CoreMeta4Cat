    todos:
    - 'Dynamic enums (https://linkml.io/linkml/schemas/enums.html#dynamic-enums) should
      be used to constrain the range of the type slot instead of using the default
      DefinedTerm as range. This will be done in profiles of this schema where we
      define Activity subclasses, e.g. NMRSpectroscopy. seeAlso: https://github.com/linkml/linkml-model/blob/main/tests/input/examples/schema_definition-enum_bindings-1.yaml'
    in_subset:
    - domain_agnostic_core
    from_schema: https://w3id.org/nfdi-de/dcat-ap-plus/
    reachable_from:
      source_ontology: https://qudt.org/vocab/unit/
      source_nodes:
      - qudt:QuantityKind
      relationship_types:
      - rdf:type
      is_direct: true
  PhysicalStateEnum:
    name: PhysicalStateEnum
    definition_uri: https://w3id.org/nfdi-de/dcat-ap-plus/materials/PhysicalStateEnum
    implements:
    - owl:NamedIndividual
    from_schema: https://w3id.org/nfdi-de/dcat-ap-plus/materials/
    permissible_values:
      SOLID:
        text: SOLID
        description: A state of matter in which molecules are closely packed and cannot
          move past each other.
        meaning: PATO:0001736
      LIQUID:
        text: LIQUID
        description: A state of matter with a definite volume but no fixed shape.
          Liquids adapt to the shape of their container and are nearly incompressible,
          maintaining their volume even under pressure.
        meaning: PATO:0001735
      GASEOUS:
        text: GASEOUS
        description: A state of matter with neither fixed volume nor fixed shape.
        meaning: PATO:0001737
      PLASMA:
        text: PLASMA
        description: A state of matter in which a gas becomes ionized and conducts
          electricity, often found in high-energy environments such as stars or lightning.
        meaning: PATO:0015012
