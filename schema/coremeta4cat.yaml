classes:
  CatalysisDataset:
    name: CatalysisDataset
    definition_uri: https://w3id.org/nfdi4cat/coremeta4cat/CatalysisDataset
    description: "A dcat:Dataset that contains research data in the field of catalysis.\n\
      \nThe catalysis research field is expressed via rdf_type using a voc4cat\nterm\
      \ from CatalysisResearchFieldEnum (following DCAT-AP-PLUS Pattern 3).\nFor example,\
      \ a dataset from heterogeneous catalysis research would carry:\n  rdf_type:\n\
      \    id: VOC4CAT:0007001\n    title: \"heterogeneous catalysis\"\n\nThe four\
      \ CoreMeta4Cat minimum information pillars are linked via the slots\nbelow,\
      \ each pointing to the corresponding DataGeneratingActivity or\nEvaluatedActivity\
      \ subclass defined in the CoreMeta4Cat subprofile modules."
    from_schema: https://w3id.org/nfdi4cat/coremeta4cat
    mappings:
    - dcat:Dataset
    is_a: Dataset
    slots:
    - Dataset_access_rights
    - Dataset_applicable_legislation
    - Dataset_conforms_to
    - Dataset_contact_point
    - Dataset_creator
    - Dataset_dataset_distribution
    - Dataset_description
    - Dataset_documentation
    - Dataset_frequency
    - Dataset_geographical_coverage
    - Dataset_has_version
    - Dataset_identifier
    - Dataset_in_series
    - Dataset_is_referenced_by
    - Dataset_keyword
    - Dataset_landing_page
    - Dataset_language
    - Dataset_modification_date
    - Dataset_other_identifier
    - Dataset_provenance
    - Dataset_publisher
    - Dataset_qualified_attribution
    - Dataset_qualified_relation
    - Dataset_related_resource
    - Dataset_release_date
    - Dataset_sample
    - Dataset_source
    - Dataset_spatial_resolution
    - Dataset_temporal_coverage
    - Dataset_temporal_resolution
    - Dataset_theme
    - Dataset_title
    - Dataset_type
    - Dataset_version
    - Dataset_version_notes
    - id
    - CatalysisDataset_rdf_type
    - CatalysisDataset_was_generated_by
    - CatalysisDataset_is_about_activity
    - CatalysisDataset_is_about_entity
    slot_usage:
      rdf_type:
        name: rdf_type
        description: 'The catalysis research field, provided as a voc4cat term from

          CatalysisResearchFieldEnum. This is the primary machine-actionable

          classification of the dataset''s domain.'
        bindings:
        - range: CatalysisResearchFieldEnum
          obligation_level:
            text: RECOMMENDED
            description: The metadata element is recommended to be present in the
              model
          binds_value_of: id
          description: Classify the dataset by catalysis research field using voc4cat.
        recommended: true
      was_generated_by:
        name: was_generated_by
        description: 'The DataGeneratingActivity (Synthesis, Characterization, or
          Simulation)

          that produced this dataset.'
        range: DataGeneratingActivity
        recommended: true
        multivalued: true
        inlined_as_list: true
      is_about_activity:
        name: is_about_activity
        description: 'The catalytic Reaction that this dataset is about (e.g. a dataset
          of

          catalytic performance measurements is about the Reaction being studied).'
        range: EvaluatedActivity
        recommended: true
        multivalued: true
        inlined_as_list: true
      is_about_entity:
        name: is_about_entity
        description: The catalyst sample, material, or other Entity that this dataset
          is about.
        range: EvaluatedEntity
        recommended: true
        multivalued: true
        inlined_as_list: true
    class_uri: dcat:Dataset
  DryingMixin:
    name: DryingMixin
    definition_uri: https://w3id.org/nfdi4cat/coremeta4cat/DryingMixin
    description: 'Mixin providing drying step parameters. Used by preparation methods
      that

      include a drying step after synthesis or precipitation

      (Impregnation, CoPrecipitation, DepositionPrecipitation,

      SonochemicalSynthesis, MolecularSynthesis).'
    from_schema: https://w3id.org/nfdi4cat/coremeta4cat/synthesis/
    mixin: true
    slots:
    - drying_device
    - drying_temperature
    - drying_time
    - drying_atmosphere
    class_uri: coremeta4cat:DryingMixin
  CalcinationMixin:
    name: CalcinationMixin
    definition_uri: https://w3id.org/nfdi4cat/coremeta4cat/CalcinationMixin
    description: 'Mixin providing calcination step parameters. Used by preparation
      methods

      that include a thermal calcination step

      (Impregnation, CoPrecipitation, DepositionPrecipitation,

      SonochemicalSynthesis, ExsolutionSynthesis).'
    from_schema: https://w3id.org/nfdi4cat/coremeta4cat/synthesis/
    mixin: true
    slots:
    - calcination_initial_temperature
    - calcination_final_temperature
    - calcination_dwelling_time
    - number_of_cycles
    - calcination_gaseous_environment
    - calcination_heating_rate
    - calcination_gas_flow_rate
    class_uri: coremeta4cat:CalcinationMixin
  PrecipitationMixin:
    name: PrecipitationMixin
    definition_uri: https://w3id.org/nfdi4cat/coremeta4cat/PrecipitationMixin
    description: 'Mixin providing precipitation and wet-chemistry step parameters.
      Used by

      preparation methods based on precipitation from solution

      (CoPrecipitation, DepositionPrecipitation).'
    from_schema: https://w3id.org/nfdi4cat/coremeta4cat/synthesis/
    mixin: true
    slots:
    - precipitating_agent
    - precipitating_concentration
    - synthesis_ph
    - mixing_rate
    - mixing_time
    - mixing_temperature
    - order_of_addition
    - filtration
    - purification
    - aging_temperature
    - aging_time
    class_uri: coremeta4cat:PrecipitationMixin
  ThermalSynthesisMixin:
    name: ThermalSynthesisMixin
    definition_uri: https://w3id.org/nfdi4cat/coremeta4cat/ThermalSynthesisMixin
    description: 'Mixin providing thermal process parameters common to synthesis methods

      carried out at elevated temperature in a closed vessel or reactor

      (Solvothermal, PlasmaAssisted, CombustionSynthesis,

      MicrowaveAssisted, MechanochemicalSynthesis, Sublimation).'
    from_schema: https://w3id.org/nfdi4cat/coremeta4cat/synthesis/
    mixin: true
    slots:
    - synthesis_temperature
    - synthesis_duration
    - equipment
    - vessel_type
    - atmosphere
    class_uri: coremeta4cat:ThermalSynthesisMixin
  Synthesis:
    name: Synthesis
    definition_uri: https://w3id.org/nfdi4cat/coremeta4cat/Synthesis
    description: 'A DataGeneratingActivity in which a catalyst is prepared.


      The preparation protocol is linked via realized_plan using a

      PreparationMethod instance. Input materials (Precursors) are linked via

      had_input_entity. The resulting catalyst (CatalystSample) is linked via

      had_output_entity.


      The type of synthesis is further specified via rdf_type using an ontology

      term (e.g. a voc4cat preparation method term), following DCAT-AP-PLUS

      Pattern 3.'
    from_schema: https://w3id.org/nfdi4cat/coremeta4cat/synthesis/
    mappings:
    - OBI:0000070
    is_a: DataGeneratingActivity
    slots:
    - id
    - Activity_title
    - Activity_description
    - Activity_other_identifier
    - Activity_has_part
    - Activity_had_input_activity
    - Activity_carried_out_by
    - Activity_has_qualitative_attribute
    - Activity_has_quantitative_attribute
    - Activity_part_of
    - ClassifierMixin_type
    - rdf_type
    - evaluated_entity
    - evaluated_activity
    - occurred_in
    - Synthesis_nominal_composition
    - Synthesis_catalyst_measured_properties
    - Synthesis_storage_conditions
    - support
    - solvent
    - sample_pretreatment
    - Synthesis_had_input_entity
    - Synthesis_had_output_entity
    - Synthesis_realized_plan
    slot_usage:
      nominal_composition:
        name: nominal_composition
        required: true
      catalyst_measured_properties:
        name: catalyst_measured_properties
        required: true
      had_input_entity:
        name: had_input_entity
        description: The Precursor(s) consumed during this Synthesis.
        range: Precursor
        required: true
        multivalued: true
        inlined_as_list: true
      had_output_entity:
        name: had_output_entity
        description: The CatalystSample produced by this Synthesis.
        range: CatalystSample
        recommended: true
        multivalued: true
        inlined_as_list: true
      realized_plan:
        name: realized_plan
        description: The PreparationMethod (protocol) realized in this Synthesis.
        range: PreparationMethod
        required: true
      storage_conditions:
        name: storage_conditions
        recommended: true
    class_uri: OBI:0000070
  Precursor:
    name: Precursor
    definition_uri: https://w3id.org/nfdi4cat/coremeta4cat/Precursor
    description: 'A MaterialSample that serves as input material in a catalyst Synthesis.

      Precursors are consumed or transformed during the preparation process.'
    from_schema: https://w3id.org/nfdi4cat/coremeta4cat/synthesis/
    mappings:
    - CHEBI:52717
    is_a: MaterialSample
    slots:
    - id
    - has_qualitative_attribute
    - has_quantitative_attribute
    - Entity_has_part
    - Entity_part_of
    - ClassifierMixin_type
    - rdf_type
    - EvaluatedEntity_was_generated_by
    - EvaluatedEntity_title
    - EvaluatedEntity_description
    - EvaluatedEntity_other_identifier
    - MaterialSample_derived_from
    - alternative_label
    - has_physical_state
    - has_temperature
    - has_mass
    - has_volume
    - has_density
    - has_pressure
    - Precursor_precursor_quantity
    slot_usage:
      precursor_quantity:
        name: precursor_quantity
        required: true
    class_uri: CHEBI:52717
  CatalystSample:
    name: CatalystSample
    definition_uri: https://w3id.org/nfdi4cat/coremeta4cat/CatalystSample
    description: 'A MaterialSample that is the product of a catalyst Synthesis.

      The specific type of catalyst (e.g. heterogeneous, supported metal)

      is expressed via rdf_type using a voc4cat term.'
    from_schema: https://w3id.org/nfdi4cat/coremeta4cat/synthesis/
    mappings:
