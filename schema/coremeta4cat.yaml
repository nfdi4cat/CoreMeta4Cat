  Characterization:
    name: Characterization
    definition_uri: https://w3id.org/nfdi4cat/coremeta4cat/Characterization
    description: "A DataGeneratingActivity in which a catalyst sample or catalytic\
      \ material\nis characterized using an analytical technique.\n\nThe catalyst\
      \ sample being characterized is linked via evaluated_entity.\nThe analytical\
      \ protocol is linked via realized_plan using a\nCharacterizationTechnique instance.\
      \ The instrument used is linked via\ncarried_out_by as a Device.\n\nThe specific\
      \ technique type is expressed via rdf_type using an ontology\nterm (e.g. CHMO:0000158\
      \ for powder XRD, CHMO:0000404 for XPS),\nfollowing DCAT-AP-PLUS Pattern 3 \u2014\
      \ exactly as NMRSpectroscopy uses\nrdf_type: CHMO:0000613."
    from_schema: https://w3id.org/nfdi4cat/coremeta4cat/characterization/
    mappings:
    - OBI:0000070
    is_a: DataGeneratingActivity
    slots:
    - id
    - Activity_title
    - Activity_description
    - Activity_other_identifier
    - Activity_has_part
    - Activity_had_input_entity
    - Activity_had_output_entity
    - Activity_had_input_activity
    - Activity_carried_out_by
    - Activity_has_qualitative_attribute
    - Activity_has_quantitative_attribute
    - Activity_part_of
    - ClassifierMixin_type
    - evaluated_activity
    - occurred_in
    - Characterization_equipment
    - sample_state
    - sample_description
    - sample_preparation
    - sample_pretreatment
    - detector_type
    - Characterization_evaluated_entity
    - Characterization_realized_plan
    - Characterization_rdf_type
    slot_usage:
      equipment:
        name: equipment
        description: Instrument or equipment used for characterization.
        required: true
      evaluated_entity:
        name: evaluated_entity
        description: The catalyst sample or material being characterized.
        range: EvaluatedEntity
        recommended: true
        multivalued: true
        inlined_as_list: true
      realized_plan:
        name: realized_plan
        description: The CharacterizationTechnique (protocol) realized in this Characterization.
        range: CharacterizationTechnique
        required: true
      rdf_type:
        name: rdf_type
        description: 'The type of characterization technique as an ontology term,
          e.g.

          CHMO:0000158 (powder XRD), CHMO:0000404 (XPS), VOC4CAT:0000075 (SEM).'
        recommended: true
    class_uri: OBI:0000070
