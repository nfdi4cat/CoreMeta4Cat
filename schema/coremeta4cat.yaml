    - has_volume
    - has_density
    - has_pressure
    - CatalystSample_derived_from
    slot_usage:
      derived_from:
        name: derived_from
        description: 'The Precursor(s) or other MaterialSample from which this

          CatalystSample was produced.'
        range: MaterialSample
    class_uri: OBI:0000747
  PreparationMethod:
    name: PreparationMethod
    definition_uri: https://w3id.org/nfdi4cat/coremeta4cat/PreparationMethod
    description: "An abstract Plan describing the protocol used to prepare a catalyst.\n\
      Concrete subclasses (Impregnation, CoPrecipitation, \u2026) specify the\nmethod-specific\
      \ parameters. Linked from Synthesis via realized_plan.\n\nThe specific preparation\
      \ method type should additionally be expressed\nvia rdf_type on the Synthesis\
      \ activity using a voc4cat term\n(e.g. VOC4CAT:0007016 for preparation method)."
