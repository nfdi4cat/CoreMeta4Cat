default_prefix: coremeta4cat
default_range: string
subsets:
  domain_agnostic_core:
    name: domain_agnostic_core
    definition_uri: https://w3id.org/nfdi-de/dcat-ap-plus/DomainAgnosticCore
    description: The elements of this subset are considered the core layer of our
      DCAT-AP extension.
    from_schema: https://w3id.org/nfdi-de/dcat-ap-plus/
types:
  string:
    name: string
    definition_uri: https://w3id.org/linkml/String
    description: A character string
    notes:
    - In RDF serializations, a slot with range of string is treated as a literal or
      type xsd:string.   If you are authoring schemas in LinkML YAML, the type is
      referenced with the lower case "string".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Text
    base: str
    uri: xsd:string
  integer:
    name: integer
    definition_uri: https://w3id.org/linkml/Integer
    description: An integer
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "integer".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Integer
    base: int
    uri: xsd:integer
  boolean:
    name: boolean
    definition_uri: https://w3id.org/linkml/Boolean
    description: A binary (true or false) value
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "boolean".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Boolean
    base: Bool
    uri: xsd:boolean
    repr: bool
  float:
    name: float
    definition_uri: https://w3id.org/linkml/Float
    description: A real number that conforms to the xsd:float specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "float".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Float
    base: float
    uri: xsd:float
  double:
    name: double
    definition_uri: https://w3id.org/linkml/Double
    description: A real number that conforms to the xsd:double specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "double".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    close_mappings:
    - schema:Float
    base: float
    uri: xsd:double
  decimal:
    name: decimal
    definition_uri: https://w3id.org/linkml/Decimal
    description: A real number with arbitrary precision that conforms to the xsd:decimal
      specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "decimal".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    broad_mappings:
    - schema:Number
    base: Decimal
    uri: xsd:decimal
  time:
    name: time
    definition_uri: https://w3id.org/linkml/Time
    description: A time object represents a (local) time of day, independent of any
      particular day
    notes:
    - URI is dateTime because OWL reasoners do not work with straight date or time
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "time".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Time
    base: XSDTime
    uri: xsd:time
    repr: str
  date:
    name: date
    definition_uri: https://w3id.org/linkml/Date
    description: a date (year, month and day) in an idealized calendar
    notes:
    - URI is dateTime because OWL reasoners don't work with straight date or time
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "date".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Date
    base: XSDDate
    uri: xsd:date
    repr: str
  datetime:
    name: datetime
    definition_uri: https://w3id.org/linkml/Datetime
    description: The combination of a date and time
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "datetime".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:DateTime
    base: XSDDateTime
    uri: xsd:dateTime
    repr: str
  date_or_datetime:
    name: date_or_datetime
    definition_uri: https://w3id.org/linkml/DateOrDatetime
    description: Either a date or a datetime
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "date_or_datetime".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: linkml:DateOrDatetime
    repr: str
  uriorcurie:
    name: uriorcurie
    definition_uri: https://w3id.org/linkml/Uriorcurie
    description: a URI or a CURIE
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "uriorcurie".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: URIorCURIE
    uri: xsd:anyURI
    repr: str
  curie:
    name: curie
    definition_uri: https://w3id.org/linkml/Curie
    conforms_to: https://www.w3.org/TR/curie/
    description: a compact URI
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "curie".
    comments:
    - in RDF serializations this MUST be expanded to a URI
    - in non-RDF serializations MAY be serialized as the compact representation
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: Curie
    uri: xsd:string
    repr: str
  uri:
    name: uri
    definition_uri: https://w3id.org/linkml/Uri
    conforms_to: https://www.ietf.org/rfc/rfc3987.txt
    description: a complete URI
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "uri".
    comments:
    - in RDF serializations a slot with range of uri is treated as a literal or type
      xsd:anyURI unless it is an identifier or a reference to an identifier, in which
      case it is translated directly to a node
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    close_mappings:
    - schema:URL
    base: URI
    uri: xsd:anyURI
    repr: str
  ncname:
    name: ncname
    definition_uri: https://w3id.org/linkml/Ncname
    description: Prefix part of CURIE
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "ncname".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: NCName
    uri: xsd:string
    repr: str
  objectidentifier:
    name: objectidentifier
    definition_uri: https://w3id.org/linkml/Objectidentifier
    description: A URI or CURIE that represents an object in the model.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "objectidentifier".
    comments:
    - Used for inheritance and type checking
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: ElementIdentifier
    uri: shex:iri
    repr: str
  nodeidentifier:
    name: nodeidentifier
    definition_uri: https://w3id.org/linkml/Nodeidentifier
    description: A URI, CURIE or BNODE that represents a node in a model.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "nodeidentifier".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: NodeIdentifier
    uri: shex:nonLiteral
    repr: str
  jsonpointer:
    name: jsonpointer
    definition_uri: https://w3id.org/linkml/Jsonpointer
    conforms_to: https://datatracker.ietf.org/doc/html/rfc6901
    description: A string encoding a JSON Pointer. The value of the string MUST conform
      to JSON Point syntax and SHOULD dereference to a valid object within the current
      instance document when encoded in tree form.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "jsonpointer".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
  jsonpath:
    name: jsonpath
    definition_uri: https://w3id.org/linkml/Jsonpath
    conforms_to: https://www.ietf.org/archive/id/draft-goessner-dispatch-jsonpath-00.html
    description: A string encoding a JSON Path. The value of the string MUST conform
      to JSON Point syntax and SHOULD dereference to zero or more valid objects within
      the current instance document when encoded in tree form.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "jsonpath".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
  sparqlpath:
    name: sparqlpath
    definition_uri: https://w3id.org/linkml/Sparqlpath
    conforms_to: https://www.w3.org/TR/sparql11-query/#propertypaths
    description: A string encoding a SPARQL Property Path. The value of the string
      MUST conform to SPARQL syntax and SHOULD dereference to zero or more valid objects
      within the current instance document when encoded as RDF.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "sparqlpath".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
  duration:
    name: duration
    definition_uri: https://w3id.org/nfdi-de/dcat-ap-plus/Duration
    conforms_to: https://www.w3.org/TR/xmlschema11-2/#duration
    description: The datatype that represents durations of time.
    from_schema: https://w3id.org/nfdi-de/dcat-ap-plus/
    base: str
    uri: xsd:duration
    pattern: -?P((([0-9]+Y([0-9]+M)?([0-9]+D)?|([0-9]+M)([0-9]+D)?|([0-9]+D))(T(([0-9]+H)([0-9]+M)?([0-9]+(\.[0-9]+)?S)?|([0-9]+M)([0-9]+(\.[0-9]+)?S)?|([0-9]+(\.[0-9]+)?S)))?)|(T(([0-9]+H)([0-9]+M)?([0-9]+(\.[0-9]+)?S)?|([0-9]+M)([0-9]+(\.[0-9]+)?S)?|([0-9]+(\.[0-9]+)?S))))
  hexBinary:
    name: hexBinary
    definition_uri: https://w3id.org/nfdi-de/dcat-ap-plus/HexBinary
    conforms_to: https://www.w3.org/TR/xmlschema11-2/#hexBinary
    description: The datatype that represents arbitrary hex-encoded binary data.
    from_schema: https://w3id.org/nfdi-de/dcat-ap-plus/
    base: str
    uri: xsd:hexBinary
    pattern: ([0-9a-fA-F]{2})*
  nonNegativeInteger:
    name: nonNegativeInteger
    definition_uri: https://w3id.org/nfdi-de/dcat-ap-plus/NonNegativeInteger
    conforms_to: https://www.w3.org/TR/xmlschema11-2/#nonNegativeInteger
    description: The datatype that represents non-negative integers.
    from_schema: https://w3id.org/nfdi-de/dcat-ap-plus/
    base: int
    uri: xsd:nonNegativeInteger
    pattern: ([\-+]?[0-9]+)
enums:
  CatalysisResearchFieldEnum:
    name: CatalysisResearchFieldEnum
    definition_uri: https://w3id.org/nfdi4cat/coremeta4cat/CatalysisResearchFieldEnum
    description: 'Enumeration of catalysis research fields.

      Intended for use via rdf_type on a dcat:Dataset (via ClassifierMixin)

      to classify which field of catalysis the dataset belongs to,

      following DCAT-AP-PLUS Pattern 3 (Flexible classification).'
    from_schema: https://w3id.org/nfdi4cat/coremeta4cat/common/
    permissible_values:
      heterogeneous_catalysis:
        text: heterogeneous_catalysis
        description: "Heterogeneous catalysis \u2014 catalyst and reactants are in\
          \ different phases."
        meaning: VOC4CAT:0007001
      homogeneous_catalysis:
        text: homogeneous_catalysis
        description: "Homogeneous catalysis \u2014 catalyst and reactants are in the\
          \ same phase."
        meaning: VOC4CAT:0000294
      biocatalysis:
        text: biocatalysis
        description: "Biocatalysis \u2014 use of enzymes or whole cells as catalysts."
        meaning: VOC4CAT:0000204
      electrocatalysis:
        text: electrocatalysis
        description: "Electrocatalysis \u2014 catalysis of electrochemical reactions."
        meaning: VOC4CAT:0000216
      hybrid_catalysis:
        text: hybrid_catalysis
        description: "Hybrid catalysis \u2014 combination of two or more catalytic\
          \ approaches."
      other:
        text: other
        description: Other catalysis research field not covered by the above terms.
  ImpregnationTypeEnum:
    name: ImpregnationTypeEnum
    definition_uri: https://w3id.org/nfdi4cat/coremeta4cat/ImpregnationTypeEnum
    description: Enumeration of impregnation types used in catalyst synthesis.
    from_schema: https://w3id.org/nfdi4cat/coremeta4cat/common/
    permissible_values:
      wet_impregnation:
        text: wet_impregnation
        description: "Wet impregnation \u2014 excess solution is used to impregnate\
          \ the support."
      dry_impregnation:
        text: dry_impregnation
        description: "Dry impregnation \u2014 solution volume equals the pore volume\
          \ of the support."
      incipient_wetness:
        text: incipient_wetness
        description: "Incipient wetness impregnation \u2014 synonym for dry impregnation."
      other:
        text: other
        description: Other impregnation type.
  SampleStateEnum:
    name: SampleStateEnum
    definition_uri: https://w3id.org/nfdi4cat/coremeta4cat/SampleStateEnum
    description: Enumeration of physical states in which a catalyst sample may be
      present.
    from_schema: https://w3id.org/nfdi4cat/coremeta4cat/common/
    permissible_values:
      solid:
        text: solid
        description: Solid state.
      liquid:
        text: liquid
        description: Liquid state.
      gas:
        text: gas
        description: Gas state.
      solution:
        text: solution
        description: Dissolved in solvent.
      powder:
        text: powder
        description: Powder form.
      pellet:
        text: pellet
        description: Pellet form (pressed powder).
      thin_film:
        text: thin_film
        description: Thin film deposited on a substrate.
      other:
        text: other
        description: Other sample state.
