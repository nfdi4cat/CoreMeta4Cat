---
site_name: "CoreMeta4Cat"
theme:
  name: material
  # palette:
  #  scheme: slate
  #  primary: cyan
  features:
    - content.tabs.link
    - search.highlight
    - navigation.expand
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
  logo: images/CoreMeta4Cat_Picture.png

# for adding extra css/js see https://www.mkdocs.org/user-guide/customizing-your-theme/

plugins:
  - search
  - mknotebooks:
      execute: false
  - mermaid2:
      version: 11.4.1
  - mike:
      # Multi-version support, https://github.com/jimporter/mike
      canonical_version: "latest"
      version_selector: true
  # TODO rebuild docs on schema change (https://github.com/dalito/linkml-project-copier/issues/39)
  # - gen-files:
  #     scripts:
  #       - gen_pages.py  # or any other name or path

watch:
  - src/coremeta4cat/schema

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Overview: overview.md
  - Design Patterns: design-patterns.md
  - How to extend: how-to-extend.md
  - Intended Users: coremeta4cat-users.md  
  # - A Hero's Journey:
    # - Introduction: a_heros_journey/a_heros_journey.md
    # - Infrastructure: a_heros_journey/infrastructure.md
    # - Workflow: a_heros_journey/workflow.md
    # - Collaborations and Future Work: a_heros_journey/collaboration_and_future.md
  - Documentation:
    - Synthesis: synthesis.md
    - Characterization: characterization.md
    - Reaction: reaction.md
    - Simulation: simulation.md
  - Schema: elements/overview.md
  - About: about.md
  - Contributing: contributing.md

exclude_docs: |
  /templates-linkml/

extra_css:
  - stylesheets//no-details-box.css

site_url: https://nfdi4cat.github.io/CoreMeta4Cat
repo_url: https://github.com/nfdi4cat/CoreMeta4Cat
use_directory_urls: true

# enable version selector for multi-version support
extra:
  version:
    provider: mike
    alias: true
    default:
      - stable

# Uncomment this block to enable use of Google Analytics.
# Replace the property value with your own ID.
# extra:
#   analytics:
#     provider: google
#     property: G-XXXXXXXXXX

markdown_extensions:
  - md_in_html
  - admonition
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences:
      # make exceptions to highlighting of code:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
